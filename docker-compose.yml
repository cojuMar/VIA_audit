version: "3.9"

# ---------------------------------------------------------------------------
# Project Aegis 2026 – Local Development Environment
# ---------------------------------------------------------------------------

networks:
  aegis-internal:
    driver: bridge
    # internal: true   # temporarily disabled for QA testing — re-enable before prod
  aegis-external:
    driver: bridge

volumes:
  pgdata:
  tsdata:
  redis-data:
  minio-data:
  kafka-data:

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 – primary OLTP store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis_admin
      POSTGRES_PASSWORD: aegis_dev_pw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis_admin -d aegis"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - aegis-internal

  # ---------------------------------------------------------------------------
  # TimescaleDB – time-series / metrics store
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: aegis_timeseries
      POSTGRES_USER: aegis_admin
      POSTGRES_PASSWORD: aegis_dev_pw
    ports:
      - "5433:5432"
    volumes:
      - tsdata:/var/lib/postgresql/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aegis-internal

  # ---------------------------------------------------------------------------
  # PgBouncer – connection pooler
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    restart: unless-stopped
    ports:
      - "6432:6432"
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infra/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aegis-internal

  # ---------------------------------------------------------------------------
  # Redis 7 – session cache and pub/sub
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aegis-internal

  # ---------------------------------------------------------------------------
  # HashiCorp Vault – secrets management
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.16
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: aegis-dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
      - "8201:8201"
    volumes:
      - ./infra/vault/vault-config.hcl:/vault/config/vault-config.hcl:ro
    command: vault server -dev -config=/vault/config/vault-config.hcl
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - aegis-internal

  # ---------------------------------------------------------------------------
  # Vault Init – one-shot initialisation job
  # ---------------------------------------------------------------------------
  vault-init:
    image: hashicorp/vault:1.16
    restart: "no"
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: aegis-dev-root-token
    volumes:
      - ./infra/vault/init-vault.sh:/init-vault.sh:ro
    entrypoint: ["/bin/sh", "/init-vault.sh"]
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - aegis-internal


  # ---------------------------------------------------------------------------
  # PAM Broker – privileged-access management
  # ---------------------------------------------------------------------------
  pam-broker:
    build: ./services/pam-broker
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: "postgresql://aegis_admin:aegis_dev_pw@pgbouncer:6432/aegis"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: aegis-dev-root-token
      AUTH_SERVICE_JWKS_URL: "http://auth-service:3001/.well-known/jwks.json"
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - aegis-internal
      - aegis-external

  # ---------------------------------------------------------------------------
  # Tenant Registry – multi-tenant configuration store
  # ---------------------------------------------------------------------------
  tenant-registry:
    build: ./services/tenant-registry
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: "postgresql://aegis_admin:aegis_dev_pw@pgbouncer:6432/aegis"
      AUTH_SERVICE_JWKS_URL: "http://auth-service:3001/.well-known/jwks.json"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aegis-internal
      - aegis-external

  # ---------------------------------------------------------------------------
  # MinIO – S3-compatible WORM object storage for evidence blobs and ZK proofs
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: aegis_minio
      MINIO_ROOT_PASSWORD: aegis_minio_dev_pw
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - aegis-internal

  # ---------------------------------------------------------------------------
  # MinIO Init – one-shot bucket provisioning job
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    restart: "no"
    environment:
      MINIO_ROOT_USER: aegis_minio
      MINIO_ROOT_PASSWORD: aegis_minio_dev_pw
      MINIO_ENDPOINT: "http://minio:9000"
    volumes:
      - ./infra/minio/minio-init.sh:/init/minio-init.sh:ro
    entrypoint: ["/bin/sh", "/init/minio-init.sh"]
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - aegis-internal

  # ---------------------------------------------------------------------------
  # ZooKeeper – Kafka coordination service
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - aegis-internal

  # ---------------------------------------------------------------------------
  # Kafka – event streaming backbone
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - aegis-internal

  # ---------------------------------------------------------------------------
  # Kafka Init – one-shot topic provisioning job
  # ---------------------------------------------------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    restart: "no"
    volumes:
      - ./infra/kafka/kafka-topics.sh:/init/kafka-topics.sh:ro
    entrypoint: ["/bin/bash", "/init/kafka-topics.sh"]
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - aegis-internal

  # ---------------------------------------------------------------------------
  # Ingestion Orchestrator – schedules connector polls and emits evidence events
  # ---------------------------------------------------------------------------
  ingestion-orchestrator:
    build: ./services/ingestion-orchestrator
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      DATABASE_URL: "postgresql://aegis_admin:aegis_dev_pw@pgbouncer:6432/aegis"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: aegis-dev-root-token
      AUTH_SERVICE_JWKS_URL: "http://auth-service:3001/.well-known/jwks.json"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: aegis_minio
      MINIO_SECRET_KEY: aegis_minio_dev_pw
      EVIDENCE_STORE_URL: "http://evidence-store:3005"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - aegis-internal
      - aegis-external

  # ---------------------------------------------------------------------------
  # Evidence Store – durable evidence record persistence and retrieval API
  # ---------------------------------------------------------------------------
  evidence-store:
    build: ./services/evidence-store
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      DATABASE_URL: "postgresql://aegis_admin:aegis_dev_pw@pgbouncer:6432/aegis"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: aegis_minio
      MINIO_SECRET_KEY: aegis_minio_dev_pw
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      AUTH_SERVICE_JWKS_URL: "http://auth-service:3001/.well-known/jwks.json"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - aegis-internal
      - aegis-external

  # ---------------------------------------------------------------------------
  # ZK Proof Worker – generates and verifies zero-knowledge proofs
  # Memory-intensive: allocated up to 15 GB RAM for large batch proof generation
  # ---------------------------------------------------------------------------
  zk-proof-worker:
    build: ./services/zk-proof-worker
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      DATABASE_URL: "postgresql://aegis_admin:aegis_dev_pw@pgbouncer:6432/aegis"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: aegis_minio
      MINIO_SECRET_KEY: aegis_minio_dev_pw
      ZK_WORKER_MAX_RAM_GB: "14"
      ZK_WORKER_MAX_BATCH_SIZE: "262144"
      RUST_LOG: info
    deploy:
      resources:
        limits:
          memory: 15g
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - aegis-internal
      - aegis-external

  # ---------------------------------------------------------------------------
  # MLflow – experiment tracking server backed by PostgreSQL + MinIO
  # Provides model versioning, run metadata, and artifact proxy for the
  # forensic-ml-service training pipeline.
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    restart: unless-stopped
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri postgresql://aegis_admin:aegis_dev_pw@postgres:5432/aegis_mlflow
      --default-artifact-root s3://aegis-ml-artifacts/
      --host 0.0.0.0
      --port 5000
    environment:
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: aegis_minio
      AWS_SECRET_ACCESS_KEY: aegis_minio_dev_pw
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - aegis-internal

  # ---------------------------------------------------------------------------
  # Forensic ML Service – anomaly detection, Benford analysis, and DRI scoring
  # Memory-intensive: allocated up to 8 GB RAM for in-process ML model serving
  # (VAE + Isolation Forest inference).  Trains weekly via cron schedule.
  # ---------------------------------------------------------------------------
  forensic-ml-service:
    build: ./services/forensic-ml-service
    restart: unless-stopped
    ports:
      - "3007:3007"
    environment:
      DATABASE_URL: "postgresql://aegis_admin:aegis_dev_pw@pgbouncer:6432/aegis"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: aegis_minio
      AWS_SECRET_ACCESS_KEY: aegis_minio_dev_pw
      REDIS_URL: "redis://redis:6379"
      AUTH_SERVICE_JWKS_URL: "http://auth-service:3001/.well-known/jwks.json"
      # Weekly retraining: every Sunday at 02:00
      ML_MODEL_RETRAIN_CRON: "0 2 * * 0"
      # Feature vector dimensionality (must match VAE input layer)
      ML_FEATURE_DIM: "12"
      # VAE latent space dimensionality
      ML_LATENT_DIM: "16"
    deploy:
      resources:
        limits:
          memory: 8g
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aegis-internal
      - aegis-external

  # ---------------------------------------------------------------------------
  # RAG Pipeline Service – retrieval-augmented generation for audit narratives
  # Generates compliance narrative documents by retrieving relevant evidence
  # chunks via pgvector ANN search and synthesising them with Claude.
  # Escalates low-confidence outputs to the HITL review queue automatically.
  # ---------------------------------------------------------------------------
  rag-pipeline-service:
    build: ./services/rag-pipeline-service
    ports:
      - "3008:3008"
    environment:
      DATABASE_URL: postgresql://aegis_app:aegis_app_pw@pgbouncer:5432/aegis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/3
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      EMBEDDING_MODEL: voyage-law-2
      EMBEDDING_DIMENSIONS: "1536"
      GENERATION_MODEL: claude-opus-4-6
      HALLUCINATION_THRESHOLD: "0.45"
      HITL_ESCALATION_ENABLED: "true"
      MAX_CONTEXT_CHUNKS: "12"
      MAX_CONTEXT_TOKENS: "8192"
      PORT: "3008"
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 2g
    networks:
      - aegis-internal
      - aegis-external
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Dashboard Service – BFF aggregation API for the Tri-Modal UX dashboard
  # Aggregates data from forensic-ml-service, rag-pipeline-service, and the
  # evidence store; computes health scores on a cron schedule; exposes a
  # WebSocket endpoint for real-time dashboard updates.
  # ---------------------------------------------------------------------------
  dashboard-service:
    build: ./services/dashboard-service
    ports:
      - "3009:3009"
    environment:
      DATABASE_URL: postgresql://aegis_app:aegis_app_pw@pgbouncer:5432/aegis
      REDIS_URL: redis://redis:6379/4
      FORENSIC_ML_URL: http://forensic-ml-service:3007
      RAG_PIPELINE_URL: http://rag-pipeline-service:3008
      EVIDENCE_STORE_URL: http://evidence-store:3005
      AUTH_SERVICE_JWKS_URL: http://auth-service:3001/.well-known/jwks.json
      PORT: "3009"
      WS_HEARTBEAT_INTERVAL: "30"
      HEALTH_SCORE_CRON: "*/15 * * * *"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      forensic-ml-service: { condition: service_healthy }
      rag-pipeline-service: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - aegis-internal
      - aegis-external
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3009/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Dashboard UI – React frontend for the Tri-Modal UX dashboard
  # Served as a static Vite build; communicates with dashboard-service over
  # HTTP (REST) and WebSocket for real-time health score and alert updates.
  # ---------------------------------------------------------------------------
  dashboard-ui:
    build: ./services/dashboard-ui
    ports:
      - "3010:3010"
    environment:
      VITE_DASHBOARD_API_URL: http://localhost:3009
      VITE_WS_URL: ws://localhost:3009/ws
    depends_on:
      dashboard-service: { condition: service_healthy }
    networks:
      - aegis-external
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Reporting Service – Sprint 6 Immutable Output & Reporting
  # Generates XBRL, iXBRL, SAF-T, GIFI, and PDF/A audit report exports.
  # Reads narrative and evidence data, renders output files, stores them in
  # MinIO (aegis-reports bucket), applies PAdES digital signatures, and records
  # export metadata in PostgreSQL.
  #
  # Note: the aegis-reports MinIO bucket is already provisioned by the
  # minio-init service (infra/minio/minio-init.sh, init_reports_bucket).
  # No additional bucket initialisation step is required.
  # ---------------------------------------------------------------------------
  reporting-service:
    build: ./services/reporting-service
    ports:
      - "3011:3011"
    environment:
      DATABASE_URL: postgresql://aegis_app:aegis_app_pw@pgbouncer:5432/aegis
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: aegis_minio
      MINIO_SECRET_KEY: aegis_minio_dev_pw
      MINIO_REPORTS_BUCKET: aegis-reports
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RAG_PIPELINE_URL: http://rag-pipeline-service:3008
      EVIDENCE_STORE_URL: http://evidence-store:3005
      SIGNING_CERT_PATH: /run/secrets/signing_cert.pem
      SIGNING_KEY_PATH: /run/secrets/signing_key.pem
      TSA_URL: http://timestamp.digicert.com
      PORT: "3011"
      REPORTS_RETENTION_DAYS: "2555"
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_healthy }
      kafka: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 2g
    networks:
      - aegis-internal
      - aegis-external
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3011/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # PQ Crypto Service – Sprint 7 MAESTRO – post-quantum key management
  # Handles Kyber KEM and Dilithium signing operations; integrates with Vault
  # for key material and Redis for ephemeral session state.
  # ---------------------------------------------------------------------------
  pq-crypto-service:
    build: services/pq-crypto-service
    ports:
      - "3012:3012"
    environment:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@postgres:5432/aegis
      PQ_SERVICE_PORT: "3012"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: aegis-dev-root-token
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3012/health"]
      interval: 10s
      retries: 5
    networks:
      - aegis-internal
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Framework Service – Sprint 8 Compliance Framework Engine
  # Loads YAML framework definitions from the /app/frameworks volume, seeds
  # and queries the compliance schema (V012), and exposes a REST API for
  # framework activation, control evidence mapping, scoring, and gap analysis.
  # ---------------------------------------------------------------------------
  framework-service:
    build: services/framework-service
    ports:
      - "3013:3013"
    environment:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@postgres:5432/aegis
      FRAMEWORK_SERVICE_PORT: "3013"
      FRAMEWORKS_DIR: /app/frameworks
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: aegis-dev-root-token
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./frameworks:/app/frameworks:ro
    depends_on:
      postgres: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3013/health"]
      interval: 10s
      retries: 5
    networks:
      - aegis-internal
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # TPRM Service – Sprint 9 Vendor & Third-Party Risk Management
  # Manages the vendor registry, questionnaire lifecycle, document analysis,
  # continuous monitoring event ingestion, contract tracking, and fourth-party
  # relationship mapping. Queries the TPRM schema (V013). Integrates with
  # MinIO for document storage and Claude for AI-powered questionnaire scoring
  # and compliance document gap analysis.
  # ---------------------------------------------------------------------------
  tprm-service:
    build: services/tprm-service
    ports:
      - "3014:3014"
    environment:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@postgres:5432/aegis
      TPRM_SERVICE_PORT: "3014"
      TEMPLATES_DIR: /app/questionnaire-templates
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: aegis_minio
      MINIO_SECRET_KEY: aegis_minio_dev_pw
      MINIO_VENDOR_DOCS_BUCKET: aegis-vendor-docs
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECURITYSCORECARD_API_KEY: ${SECURITYSCORECARD_API_KEY:-}
      REDIS_URL: redis://redis:6379/5
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: aegis-dev-root-token
    volumes:
      - ./questionnaire-templates:/app/questionnaire-templates:ro
    depends_on:
      postgres: {condition: service_healthy}
      minio: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3014/health"]
      interval: 10s
      retries: 5
    networks:
      - aegis-internal
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Trust Portal Service – Sprint 10 Client-Facing Trust Portal
  # Serves the public-facing Trust Portal: portal configuration, document
  # library with NDA gating, questionnaire deflection via AI, and an
  # RAG-powered chatbot. Stores all activity in the V014 schema.
  # ---------------------------------------------------------------------------
  trust-portal-service:
    build: ./services/trust-portal-service
    ports:
      - "3015:3015"
    environment:
      DATABASE_URL: postgresql://aegis_app:${POSTGRES_APP_PASSWORD:-aegis_app_dev_pw}@postgres:5432/aegis
      REDIS_URL: redis://redis:6379/6
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-aegis_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-aegis_minio_dev_pw}
      MINIO_BUCKET_PORTAL: aegis-portal-docs
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      RAG_PIPELINE_URL: http://rag-pipeline-service:3010
      FRAMEWORK_SERVICE_URL: http://framework-service:3012
      JWT_SECRET: ${JWT_SECRET:-aegis_dev_jwt_secret_change_in_prod}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aegis-internal
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Trust Portal UI – Sprint 10 static frontend for the public Trust Portal
  # Vite/React build served via nginx; communicates with trust-portal-service.
  # ---------------------------------------------------------------------------
  trust-portal-ui:
    build: ./services/trust-portal-ui
    ports:
      - "5176:80"
    depends_on:
      - trust-portal-service
    networks:
      - aegis-internal
      - aegis-external

  # ---------------------------------------------------------------------------
  # Monitoring Service – Sprint 11 Continuous Monitoring Engine
  # Executes monitoring rules on a cron schedule, detects payroll anomalies,
  # AP fraud, SoD conflicts, card policy violations, and cloud misconfigurations.
  # Stores runs and findings in the V015 schema. Integrates with Claude for
  # AI-assisted risk narrative generation.
  # ---------------------------------------------------------------------------
  monitoring-service:
    build: ./services/monitoring-service
    ports:
      - "3016:3016"
    environment:
      DATABASE_URL: postgresql://aegis_app:${POSTGRES_APP_PASSWORD:-aegis_app_dev_pw}@postgres:5432/aegis
      REDIS_URL: redis://redis:6379/7
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-aegis_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-aegis_minio_dev_pw}
      MINIO_BUCKET_MONITORING: aegis-monitoring
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FRAMEWORK_SERVICE_URL: http://framework-service:3012
      MONITORING_SCHEDULE_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aegis-internal
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Monitoring UI – Sprint 11 static frontend for the Continuous Monitoring dashboard
  # Vite/React build served via nginx; communicates with monitoring-service.
  # ---------------------------------------------------------------------------
  monitoring-ui:
    build: ./services/monitoring-ui
    ports:
      - "5177:80"
    depends_on:
      - monitoring-service
    networks:
      - aegis-internal
      - aegis-external

  # ---------------------------------------------------------------------------
  # People Service – Sprint 12 People, Policy & Training Compliance
  # Manages employee records, HR policy lifecycle and acknowledgments, training
  # course assignments and completions, background checks, and compliance
  # escalations. Stores all data in the V016 schema. Integrates with MinIO for
  # policy and certificate document storage and Claude for AI-assisted
  # escalation narrative generation.
  # ---------------------------------------------------------------------------
  people-service:
    build: ./services/people-service
    ports:
      - "3017:3017"
    environment:
      DATABASE_URL: postgresql://aegis_app:${POSTGRES_APP_PASSWORD:-aegis_app_dev_pw}@postgres:5432/aegis
      REDIS_URL: redis://redis:6379/8
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-aegis_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-aegis_minio_dev_pw}
      MINIO_BUCKET_PEOPLE: aegis-people-docs
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ESCALATION_SCHEDULE_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aegis-internal
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # People UI – Sprint 12 static frontend for the People Compliance dashboard
  # Vite/React build served via nginx; communicates with people-service.
  # ---------------------------------------------------------------------------
  people-ui:
    build: ./services/people-ui
    ports:
      - "5178:80"
    depends_on:
      - people-service
    networks:
      - aegis-internal
      - aegis-external

  # ---------------------------------------------------------------------------
  # PBC Service – Sprint 13 PBC Request Management, Issue Lifecycle & Workpapers
  # Manages audit engagements, PBC request lists, fulfillments, issue tracking,
  # issue responses, and workpaper authoring. Stores all data in the V017 schema.
  # Integrates with MinIO for fulfillment and evidence document storage and
  # Claude for AI-assisted workpaper narrative generation.
  # ---------------------------------------------------------------------------
  pbc-service:
    build: ./services/pbc-service
    ports:
      - "3018:3018"
    environment:
      DATABASE_URL: postgresql://aegis_app:${POSTGRES_APP_PASSWORD:-aegis_app_dev_pw}@postgres:5432/aegis
      REDIS_URL: redis://redis:6379/9
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-aegis_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-aegis_minio_dev_pw}
      MINIO_BUCKET_WORKPAPERS: aegis-workpapers
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aegis-internal
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # PBC UI – Sprint 13 static frontend for the PBC & Workpapers dashboard
  # Vite/React build served via nginx; communicates with pbc-service.
  # ---------------------------------------------------------------------------
  pbc-ui:
    build: ./services/pbc-ui
    ports:
      - "5179:80"
    depends_on:
      - pbc-service
    networks:
      - aegis-internal
      - aegis-external

  framework-ui:
    build: ./services/framework-ui
    ports:
      - "5174:80"
    depends_on:
      - framework-service
    networks:
      - aegis-internal
      - aegis-external

  tprm-ui:
    build: ./services/tprm-ui
    ports:
      - "5175:80"
    depends_on:
      - tprm-service
    networks:
      - aegis-internal
      - aegis-external

  # ---------------------------------------------------------------------------
  # Integration Service – Sprint 14 Enterprise Integration Hub
  # Manages connector definitions, tenant integrations, sync scheduling,
  # OAuth token lifecycle, webhook ingestion, and field mapping. Stores all
  # data in the V018 schema. Integrates with MinIO for raw data storage and
  # Claude for AI-assisted field mapping suggestions.
  # ---------------------------------------------------------------------------
  integration-service:
    build: ./services/integration-service
    ports:
      - "3019:3019"
    environment:
      DATABASE_URL: postgresql://aegis_app:${POSTGRES_APP_PASSWORD:-aegis_app_dev_pw}@postgres:5432/aegis
      REDIS_URL: redis://redis:6379/10
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-aegis_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-aegis_minio_dev_pw}
      MINIO_BUCKET_INTEGRATIONS: aegis-integration-data
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-32-byte-key-change-in-prod}
      SYNC_SCHEDULE_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - aegis-internal
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Integration UI – Sprint 14 static frontend for the Integration Hub dashboard
  # Vite/React build served via nginx; communicates with integration-service.
  # ---------------------------------------------------------------------------
  integration-ui:
    build: ./services/integration-ui
    ports:
      - "5180:80"
    depends_on:
      - integration-service
    networks:
      - aegis-internal
      - aegis-external

  # ---------------------------------------------------------------------------
  # AI Agent Service – Sprint 15 Agentic AI & Natural Language Platform Interface
  # Hosts the multi-turn agent loop backed by Claude; exposes NL query, report
  # generation, scheduled query execution, and feedback endpoints.
  # Connects to all domain services as tool targets.
  # ---------------------------------------------------------------------------
  ai-agent-service:
    build: ./services/ai-agent-service
    ports:
      - "3020:3020"
    environment:
      DATABASE_URL: postgresql://aegis_app:${POSTGRES_APP_PASSWORD:-aegis_app_dev_pw}@postgres:5432/aegis
      REDIS_URL: redis://redis:6379/11
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FRAMEWORK_SERVICE_URL: http://framework-service:3012
      TPRM_SERVICE_URL: http://tprm-service:3014
      MONITORING_SERVICE_URL: http://monitoring-service:3016
      PEOPLE_SERVICE_URL: http://people-service:3017
      PBC_SERVICE_URL: http://pbc-service:3018
      RAG_PIPELINE_URL: http://rag-pipeline-service:3010
      MAX_CONVERSATION_TOKENS: "100000"
      AGENT_MODEL: "claude-opus-4-5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aegis-internal
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # AI Agent UI – Sprint 15 static frontend for the Agentic AI chat interface
  # Vite/React build served via nginx; communicates with ai-agent-service.
  # ---------------------------------------------------------------------------
  ai-agent-ui:
    build: ./services/ai-agent-ui
    ports:
      - "5181:80"
    depends_on:
      - ai-agent-service
    networks:
      - aegis-internal
      - aegis-external

  # ---------------------------------------------------------------------------
  # Risk Service – Sprint 16 Risk Management Engine
  # Manages risk categories, appetite statements, risk register, assessments,
  # treatments, score history, and key risk indicators. Stores all data in
  # the V020 schema. Integrates with monitoring, TPRM, and framework services
  # for cross-domain risk correlation and Claude for AI-assisted risk analysis.
  # ---------------------------------------------------------------------------
  risk-service:
    build: ./services/risk-service
    ports:
      - "3021:3021"
    environment:
      DATABASE_URL: postgresql://aegis_app:${POSTGRES_APP_PASSWORD:-aegis_app_dev_pw}@postgres:5432/aegis
      REDIS_URL: redis://redis:6379/12
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MONITORING_SERVICE_URL: http://monitoring-service:3016
      TPRM_SERVICE_URL: http://tprm-service:3014
      FRAMEWORK_SERVICE_URL: http://framework-service:3012
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aegis-internal
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Risk UI – Sprint 16 static frontend for the Risk Management dashboard
  # Vite/React build served via nginx; communicates with risk-service.
  # ---------------------------------------------------------------------------
  risk-ui:
    build: ./services/risk-ui
    ports:
      - "5182:80"
    depends_on:
      - risk-service
    networks:
      - aegis-internal
      - aegis-external

  # ---------------------------------------------------------------------------
  # Audit Planning Service – Sprint 17 Audit Planning & Engagement Management
  # Manages the audit universe, annual audit plans, plan items, engagements,
  # time entries, milestones, and resource assignments. Stores all data in
  # the V021 schema. Integrates with risk, PBC, and monitoring services for
  # cross-domain planning context and Claude for AI-assisted audit analysis.
  # ---------------------------------------------------------------------------
  audit-planning-service:
    build: services/audit-planning-service
    ports:
      - "3022:3022"
    environment:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@postgres:5432/aegis
      AUDIT_PLANNING_SERVICE_PORT: "3022"
      REDIS_URL: redis://redis:6379/13
      RISK_SERVICE_URL: http://risk-service:3021
      PBC_SERVICE_URL: http://pbc-service:3018
      MONITORING_SERVICE_URL: http://monitoring-service:3016
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3022/health"]
      interval: 10s
      retries: 5
    networks:
      - aegis-internal
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Audit Planning UI – Sprint 17 static frontend for the Audit Planning dashboard
  # Vite/React build served via nginx; communicates with audit-planning-service.
  # ---------------------------------------------------------------------------
  audit-planning-ui:
    build: services/audit-planning-ui
    ports:
      - "5183:80"
    depends_on:
      - audit-planning-service
    networks:
      - aegis-internal
      - aegis-external
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # ESG Board Service – Sprint 18 ESG Disclosure & Board Governance
  # Manages ESG framework mappings, metric disclosures, reduction targets,
  # board committee and meeting records, agenda items, and board pack assembly.
  # Stores all data in the V022 schema. Integrates with risk, monitoring, and
  # audit-planning services for cross-domain data and Claude for AI-generated
  # executive summaries and ESG narrative drafting.
  # ---------------------------------------------------------------------------
  esg-board-service:
    build: services/esg-board-service
    ports:
      - "3023:3023"
    environment:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@postgres:5432/aegis
      ESG_BOARD_SERVICE_PORT: "3023"
      REDIS_URL: redis://redis:6379/14
      RISK_SERVICE_URL: http://risk-service:3021
      MONITORING_SERVICE_URL: http://monitoring-service:3016
      AUDIT_PLANNING_SERVICE_URL: http://audit-planning-service:3022
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: aegis_minio
      MINIO_SECRET_KEY: aegis_minio_dev_pw
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3023/health"]
      interval: 10s
      retries: 5
    networks:
      - aegis-internal
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # ESG Board UI – Sprint 18 static frontend for the ESG & Board Governance dashboard
  # Vite/React build served via nginx; communicates with esg-board-service.
  # ---------------------------------------------------------------------------
  esg-board-ui:
    build: services/esg-board-ui
    ports:
      - "5184:80"
    depends_on:
      - esg-board-service
    networks:
      - aegis-internal
      - aegis-external
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Mobile Sync Service – Sprint 19 Mobile Field Audit & Offline Sync
  # Handles offline-first sync for mobile field auditors: receives batched
  # audit responses, photos, and sync sessions from the mobile app; resolves
  # conflicts; stores evidence in MinIO (aegis-field-evidence bucket); and
  # links completed field audits back to audit-planning engagements.
  # ---------------------------------------------------------------------------
  mobile-sync-service:
    build: services/mobile-sync-service
    ports:
      - "3024:3024"
    environment:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@postgres:5432/aegis
      MOBILE_SYNC_SERVICE_PORT: "3024"
      REDIS_URL: redis://redis:6379/15
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: aegis_minio
      MINIO_SECRET_KEY: aegis_minio_dev_pw
      MINIO_BUCKET: aegis-field-evidence
      AUDIT_PLANNING_SERVICE_URL: http://audit-planning-service:3022
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3024/health"]
      interval: 10s
      retries: 5
    networks:
      - aegis-internal
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Mobile App – Sprint 19 static frontend for the Mobile Field Audit app
  # React Native Web / Vite build served via nginx; communicates exclusively
  # with mobile-sync-service for upload/download sync cycles.
  # ---------------------------------------------------------------------------
  mobile-app:
    build: services/mobile-app
    ports:
      - "5185:80"
    depends_on:
      - mobile-sync-service
    networks:
      - aegis-internal
      - aegis-external
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Auth Service – VIA JWT authentication (login, register, /auth/me)
  # FastAPI + bcrypt + python-jose. Port 3010.
  # ---------------------------------------------------------------------------
  auth-service:
    build: services/auth-service
    ports:
      - "3010:3010"
    environment:
      DATABASE_URL: postgresql://aegis_app:${POSTGRES_APP_PASSWORD:-aegis_app_dev_pw}@postgres:5432/aegis
      JWT_SECRET: ${JWT_SECRET:-aegis_dev_jwt_secret_change_in_prod}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 10s
      retries: 5
    networks:
      - aegis-internal
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Hub UI – VIA platform dashboard, module navigator, tutorials, and auth
  # Static React/Vite app served via nginx. Proxies /auth/ to auth-service.
  # ---------------------------------------------------------------------------
  hub-ui:
    build: services/hub-ui
    ports:
      - "5173:80"
    depends_on:
      - auth-service
      - dashboard-service
    networks:
      - aegis-internal
      - aegis-external
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"
