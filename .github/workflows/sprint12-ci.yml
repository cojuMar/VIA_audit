name: Sprint 12 — People, Policy & Training Compliance

on:
  push:
    branches: [main, develop, 'sprint-12/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: DB migrations — V001–V016, verify V016 schema + immutability + RLS
  # ---------------------------------------------------------------------------
  db-migrations:
    name: "Database Migrations (V016 People Compliance Schema)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aegis
          POSTGRES_USER: aegis_admin
          POSTGRES_PASSWORD: aegis_dev_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Apply all migrations V001–V016
        run: bash infra/db/migrate.sh

      - name: Verify V016 tables exist
        run: |
          psql "$DATABASE_URL" -c "
          SELECT table_name FROM information_schema.tables
          WHERE table_schema = 'public'
            AND table_name IN (
              'employees',
              'hr_policies',
              'policy_versions',
              'policy_acknowledgments',
              'training_courses',
              'training_assignments',
              'training_completions',
              'background_checks',
              'compliance_escalations'
            )
          ORDER BY table_name;" | tee /tmp/v016_tables.txt

          for table in \
            employees \
            hr_policies \
            policy_versions \
            policy_acknowledgments \
            training_courses \
            training_assignments \
            training_completions \
            background_checks \
            compliance_escalations; do
            grep -q "$table" /tmp/v016_tables.txt || \
              (echo "FATAL: V016 table '$table' not found" && exit 1)
          done
          echo "All V016 tables verified"

      - name: Assert count = 9 V016 tables
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*) FROM information_schema.tables
          WHERE table_schema='public'
            AND table_name IN (
              'employees',
              'hr_policies',
              'policy_versions',
              'policy_acknowledgments',
              'training_courses',
              'training_assignments',
              'training_completions',
              'background_checks',
              'compliance_escalations'
            );
          " | tr -d ' ')

          echo "V016 table count: $COUNT"
          if [ "$COUNT" -ne 9 ]; then
            echo "FATAL: Expected 9 V016 tables, found $COUNT"
            exit 1
          fi
          echo "V016 table count verified ($COUNT = 9)"

      - name: Verify immutability of append-only tables
        run: |
          for table in policy_versions policy_acknowledgments training_completions compliance_escalations; do
            GRANTS=$(psql "$DATABASE_URL" -t -c "
            SELECT privilege_type
            FROM information_schema.role_table_grants
            WHERE table_name = '$table'
              AND grantee = 'aegis_app'
              AND privilege_type IN ('UPDATE', 'DELETE');
            " | tr -d ' ' | grep -v '^$' || true)

            if [ -n "$GRANTS" ]; then
              echo "FATAL: $table must be append-only — aegis_app has: $GRANTS"
              exit 1
            fi
            echo "$table immutability verified (no UPDATE/DELETE for aegis_app)"
          done

      - name: Verify RLS enabled on employees
        run: |
          RLS=$(psql "$DATABASE_URL" -t -c "
          SELECT relrowsecurity FROM pg_class
          WHERE relname = 'employees';
          " | tr -d ' ')

          echo "employees RLS: $RLS"
          if [ "$RLS" != "t" ]; then
            echo "FATAL: RLS is not enabled on employees (got '$RLS')"
            exit 1
          fi
          echo "RLS verified on employees"

      - name: Verify UNIQUE constraint uq_tenant_employee_id
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*)
          FROM information_schema.table_constraints
          WHERE constraint_name = 'uq_tenant_employee_id'
            AND constraint_type = 'UNIQUE';
          " | tr -d ' ')

          echo "uq_tenant_employee_id count: $COUNT"
          if [ "$COUNT" -ne 1 ]; then
            echo "FATAL: Expected exactly 1 uq_tenant_employee_id constraint, found $COUNT"
            exit 1
          fi
          echo "uq_tenant_employee_id constraint verified"

  # ---------------------------------------------------------------------------
  # Job 2: People service Python unit tests (Sprint 12)
  # ---------------------------------------------------------------------------
  people-service-tests:
    name: "People Service Tests (Sprint 12)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/people-service/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -r services/people-service/requirements.txt

      - name: Run Sprint 12 tests
        run: |
          pytest tests/sprint12/ -v --tb=short
        env:
          DATABASE_URL: "postgresql://test:test@localhost/test"
          ESCALATION_SCHEDULE_ENABLED: "false"
          ANTHROPIC_API_KEY: "dummy"

  # ---------------------------------------------------------------------------
  # Job 3: TypeScript type-check for people-ui
  # ---------------------------------------------------------------------------
  typescript-typecheck:
    name: "TypeScript Type Check (people-ui)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/people-ui/package-lock.json

      - name: Install Node dependencies
        working-directory: services/people-ui
        run: npm ci

      - name: Run TypeScript type-check
        working-directory: services/people-ui
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Job 4: Docker build + Trivy CRITICAL scan (people-service)
  # ---------------------------------------------------------------------------
  docker-build-people-service:
    name: "Docker Build & Trivy Scan (people-service)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [people-service-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build people-service Docker image
        run: |
          docker build \
            -t aegis/people-service:ci \
            services/people-service

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/people-service:ci

  # ---------------------------------------------------------------------------
  # Job 5: Docker build + Trivy CRITICAL scan (people-ui)
  # ---------------------------------------------------------------------------
  docker-build-people-ui:
    name: "Docker Build & Trivy Scan (people-ui)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [typescript-typecheck]

    steps:
      - uses: actions/checkout@v4

      - name: Build people-ui Docker image
        run: |
          docker build \
            -t aegis/people-ui:ci \
            services/people-ui

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/people-ui:ci

  # ---------------------------------------------------------------------------
  # Job 6: Security gate — all 5 upstream jobs must succeed
  # ---------------------------------------------------------------------------
  security-gate:
    name: "Security Gate (Sprint 12)"
    runs-on: ubuntu-latest
    needs:
      - db-migrations
      - people-service-tests
      - typescript-typecheck
      - docker-build-people-service
      - docker-build-people-ui
    if: always()

    steps:
      - name: Check all Sprint 12 jobs passed
        run: |
          FAILED=0

          for job_and_result in \
            "db-migrations:${{ needs.db-migrations.result }}" \
            "people-service-tests:${{ needs.people-service-tests.result }}" \
            "typescript-typecheck:${{ needs.typescript-typecheck.result }}" \
            "docker-build-people-service:${{ needs.docker-build-people-service.result }}" \
            "docker-build-people-ui:${{ needs.docker-build-people-ui.result }}"; do
            JOB_NAME="${job_and_result%%:*}"
            JOB_RESULT="${job_and_result##*:}"
            if [ "$JOB_RESULT" != "success" ]; then
              echo "FATAL: Sprint 12 job '$JOB_NAME' did not pass (result: $JOB_RESULT)"
              FAILED=$((FAILED + 1))
            else
              echo "OK: $JOB_NAME passed"
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "$FAILED job(s) failed. Sprint 12 security gate blocked."
            exit 1
          fi

          echo ""
          echo "All Sprint 12 security gates passed."
