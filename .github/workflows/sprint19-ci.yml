# Sprint 19 — Final Sprint of Project Aegis 2026
name: Sprint 19 — Mobile Sync Service (Final Sprint)

on:
  push:
    branches: [main, develop, 'sprint-19/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: DB migrations — V001–V023, verify V023 mobile field audit schema
  # ---------------------------------------------------------------------------
  db-migrations:
    name: "Database Migrations (V023 Mobile Field Audit Schema)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aegis
          POSTGRES_USER: aegis_admin
          POSTGRES_PASSWORD: aegis_dev_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Apply all migrations V001–V023
        run: bash infra/db/migrate.sh

      - name: Verify V023 tables exist (count = 8)
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*)
          FROM information_schema.tables
          WHERE table_schema = 'public'
            AND table_name IN (
              'field_audit_template_types',
              'field_audit_templates',
              'field_audit_template_questions',
              'field_audit_assignments',
              'field_audits',
              'field_audit_responses',
              'field_audit_photos',
              'sync_sessions'
            );
          " | tr -d ' ')

          echo "V023 table count: $COUNT"
          if [ "$COUNT" -ne 8 ]; then
            echo "FATAL: Expected 8 V023 mobile field audit tables, found $COUNT"
            exit 1
          fi
          echo "V023 table count verified ($COUNT = 8)"

      - name: Verify seeded template types (count ≥ 6)
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*) FROM field_audit_template_types;
          " | tr -d ' ')

          echo "field_audit_template_types row count: $COUNT"
          if [ "$COUNT" -lt 6 ]; then
            echo "FATAL: Expected at least 6 seeded template types, found $COUNT"
            exit 1
          fi
          echo "field_audit_template_types seed verified ($COUNT ≥ 6)"

      - name: Verify seeded templates (count ≥ 3)
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*) FROM field_audit_templates;
          " | tr -d ' ')

          echo "field_audit_templates row count: $COUNT"
          if [ "$COUNT" -lt 3 ]; then
            echo "FATAL: Expected at least 3 seeded templates, found $COUNT"
            exit 1
          fi
          echo "field_audit_templates seed verified ($COUNT ≥ 3)"

      - name: Verify seeded template questions (count ≥ 12)
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*) FROM field_audit_template_questions;
          " | tr -d ' ')

          echo "field_audit_template_questions row count: $COUNT"
          if [ "$COUNT" -lt 12 ]; then
            echo "FATAL: Expected at least 12 seeded template questions, found $COUNT"
            exit 1
          fi
          echo "field_audit_template_questions seed verified ($COUNT ≥ 12)"

      - name: Verify field_audit_responses immutable (SELECT+INSERT only, no UPDATE grant)
        run: |
          GRANTS=$(psql "$DATABASE_URL" -t -c "
          SELECT privilege_type
          FROM information_schema.role_table_grants
          WHERE table_name = 'field_audit_responses'
            AND grantee = 'aegis_app'
            AND privilege_type IN ('UPDATE', 'DELETE');
          " | tr -d ' ' | grep -v '^$' || true)

          if [ -n "$GRANTS" ]; then
            echo "FATAL: field_audit_responses must be immutable — aegis_app has: $GRANTS"
            exit 1
          fi
          echo "field_audit_responses immutability verified (no UPDATE/DELETE for aegis_app)"

          SELECT_GRANT=$(psql "$DATABASE_URL" -t -c "
          SELECT privilege_type
          FROM information_schema.role_table_grants
          WHERE table_name = 'field_audit_responses'
            AND grantee = 'aegis_app'
            AND privilege_type = 'SELECT';
          " | tr -d ' ' | grep -v '^$' || true)

          INSERT_GRANT=$(psql "$DATABASE_URL" -t -c "
          SELECT privilege_type
          FROM information_schema.role_table_grants
          WHERE table_name = 'field_audit_responses'
            AND grantee = 'aegis_app'
            AND privilege_type = 'INSERT';
          " | tr -d ' ' | grep -v '^$' || true)

          echo "aegis_app SELECT on field_audit_responses: ${SELECT_GRANT:-not set (may be via role)}"
          echo "aegis_app INSERT on field_audit_responses: ${INSERT_GRANT:-not set (may be via role)}"

      - name: Verify field_audit_photos immutable (SELECT+INSERT only, no UPDATE grant)
        run: |
          GRANTS=$(psql "$DATABASE_URL" -t -c "
          SELECT privilege_type
          FROM information_schema.role_table_grants
          WHERE table_name = 'field_audit_photos'
            AND grantee = 'aegis_app'
            AND privilege_type IN ('UPDATE', 'DELETE');
          " | tr -d ' ' | grep -v '^$' || true)

          if [ -n "$GRANTS" ]; then
            echo "FATAL: field_audit_photos must be immutable — aegis_app has: $GRANTS"
            exit 1
          fi
          echo "field_audit_photos immutability verified (no UPDATE/DELETE for aegis_app)"

          SELECT_GRANT=$(psql "$DATABASE_URL" -t -c "
          SELECT privilege_type
          FROM information_schema.role_table_grants
          WHERE table_name = 'field_audit_photos'
            AND grantee = 'aegis_app'
            AND privilege_type = 'SELECT';
          " | tr -d ' ' | grep -v '^$' || true)

          INSERT_GRANT=$(psql "$DATABASE_URL" -t -c "
          SELECT privilege_type
          FROM information_schema.role_table_grants
          WHERE table_name = 'field_audit_photos'
            AND grantee = 'aegis_app'
            AND privilege_type = 'INSERT';
          " | tr -d ' ' | grep -v '^$' || true)

          echo "aegis_app SELECT on field_audit_photos: ${SELECT_GRANT:-not set (may be via role)}"
          echo "aegis_app INSERT on field_audit_photos: ${INSERT_GRANT:-not set (may be via role)}"

      - name: Verify sync_sessions immutable (SELECT+INSERT only, no UPDATE grant)
        run: |
          GRANTS=$(psql "$DATABASE_URL" -t -c "
          SELECT privilege_type
          FROM information_schema.role_table_grants
          WHERE table_name = 'sync_sessions'
            AND grantee = 'aegis_app'
            AND privilege_type IN ('UPDATE', 'DELETE');
          " | tr -d ' ' | grep -v '^$' || true)

          if [ -n "$GRANTS" ]; then
            echo "FATAL: sync_sessions must be immutable — aegis_app has: $GRANTS"
            exit 1
          fi
          echo "sync_sessions immutability verified (no UPDATE/DELETE for aegis_app)"

          SELECT_GRANT=$(psql "$DATABASE_URL" -t -c "
          SELECT privilege_type
          FROM information_schema.role_table_grants
          WHERE table_name = 'sync_sessions'
            AND grantee = 'aegis_app'
            AND privilege_type = 'SELECT';
          " | tr -d ' ' | grep -v '^$' || true)

          INSERT_GRANT=$(psql "$DATABASE_URL" -t -c "
          SELECT privilege_type
          FROM information_schema.role_table_grants
          WHERE table_name = 'sync_sessions'
            AND grantee = 'aegis_app'
            AND privilege_type = 'INSERT';
          " | tr -d ' ' | grep -v '^$' || true)

          echo "aegis_app SELECT on sync_sessions: ${SELECT_GRANT:-not set (may be via role)}"
          echo "aegis_app INSERT on sync_sessions: ${INSERT_GRANT:-not set (may be via role)}"

      - name: Verify UNIQUE constraint on field_audit_responses(field_audit_id, question_id)
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*)
          FROM information_schema.table_constraints
          WHERE table_name = 'field_audit_responses'
            AND constraint_type = 'UNIQUE';
          " | tr -d ' ')

          echo "field_audit_responses UNIQUE constraint count: $COUNT"
          if [ "$COUNT" -lt 1 ]; then
            echo "FATAL: field_audit_responses must have a UNIQUE constraint on (field_audit_id, question_id)"
            exit 1
          fi
          echo "field_audit_responses UNIQUE constraint verified ($COUNT constraint(s))"

      - name: Verify sync_id index on field_audit_responses
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*)
          FROM pg_indexes
          WHERE tablename = 'field_audit_responses'
            AND indexname LIKE '%sync_id%';
          " | tr -d ' ')

          echo "field_audit_responses sync_id index count: $COUNT"
          if [ "$COUNT" -lt 1 ]; then
            echo "FATAL: field_audit_responses must have an index on sync_id"
            exit 1
          fi
          echo "field_audit_responses sync_id index verified ($COUNT index(es))"

  # ---------------------------------------------------------------------------
  # Job 2: mobile-sync-service Python unit tests (Sprint 19)
  # ---------------------------------------------------------------------------
  mobile-sync-service-tests:
    name: "Mobile Sync Service Tests (Sprint 19)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/mobile-sync-service/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install pydantic pydantic-settings
          pip install httpx
          pip install -r services/mobile-sync-service/requirements.txt

      - name: Run Sprint 19 tests
        run: |
          pytest tests/sprint19/ -v --tb=short
        env:
          PYTHONPATH: .
          DATABASE_URL: "postgresql://test:test@localhost/test"
          ANTHROPIC_API_KEY: "dummy"

  # ---------------------------------------------------------------------------
  # Job 3: TypeScript type-check for mobile-app
  # ---------------------------------------------------------------------------
  typescript-typecheck:
    name: "TypeScript Type Check (mobile-app)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/mobile-app/package-lock.json

      - name: Install Node dependencies
        working-directory: services/mobile-app
        run: npm ci

      - name: Run TypeScript type-check
        working-directory: services/mobile-app
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Job 4: Docker build + Trivy CRITICAL scan (mobile-sync-service)
  # ---------------------------------------------------------------------------
  docker-build-mobile-sync-service:
    name: "Docker Build & Trivy Scan (mobile-sync-service)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [mobile-sync-service-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build mobile-sync-service Docker image
        run: |
          docker build \
            -t aegis/mobile-sync-service:ci \
            services/mobile-sync-service

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan (mobile-sync-service)
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/mobile-sync-service:ci

  # ---------------------------------------------------------------------------
  # Job 5: Docker build + Trivy CRITICAL scan (mobile-app)
  # ---------------------------------------------------------------------------
  docker-build-mobile-app:
    name: "Docker Build & Trivy Scan (mobile-app)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [typescript-typecheck]

    steps:
      - uses: actions/checkout@v4

      - name: Build mobile-app Docker image
        run: |
          docker build \
            -t aegis/mobile-app:ci \
            services/mobile-app

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan (mobile-app)
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/mobile-app:ci

  # ---------------------------------------------------------------------------
  # Job 6: Security gate — all 5 upstream jobs must succeed
  # ---------------------------------------------------------------------------
  security-gate:
    name: "Security Gate (Sprint 19 — Final)"
    runs-on: ubuntu-latest
    needs:
      - db-migrations
      - mobile-sync-service-tests
      - typescript-typecheck
      - docker-build-mobile-sync-service
      - docker-build-mobile-app
    if: always()

    steps:
      - name: Check all Sprint 19 jobs passed
        run: |
          FAILED=0

          for job_and_result in \
            "db-migrations:${{ needs.db-migrations.result }}" \
            "mobile-sync-service-tests:${{ needs.mobile-sync-service-tests.result }}" \
            "typescript-typecheck:${{ needs.typescript-typecheck.result }}" \
            "docker-build-mobile-sync-service:${{ needs.docker-build-mobile-sync-service.result }}" \
            "docker-build-mobile-app:${{ needs.docker-build-mobile-app.result }}"; do
            JOB_NAME="${job_and_result%%:*}"
            JOB_RESULT="${job_and_result##*:}"
            if [ "$JOB_RESULT" != "success" ]; then
              echo "FATAL: Sprint 19 job '$JOB_NAME' did not pass (result: $JOB_RESULT)"
              FAILED=$((FAILED + 1))
            else
              echo "OK: $JOB_NAME passed"
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "$FAILED job(s) failed. Sprint 19 security gate blocked."
            exit 1
          fi

          echo ""
          echo "All Sprint 19 security gates passed."
          echo "Project Aegis 2026 — all 19 sprints complete."
