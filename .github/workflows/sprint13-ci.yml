name: Sprint 13 — PBC Request Management, Issue Lifecycle & Workpapers

on:
  push:
    branches: [main, develop, 'sprint-13/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: DB migrations — V001–V017, verify V017 schema + immutability + RLS
  # ---------------------------------------------------------------------------
  db-migrations:
    name: "Database Migrations (V017 PBC & Workpaper Schema)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aegis
          POSTGRES_USER: aegis_admin
          POSTGRES_PASSWORD: aegis_dev_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Apply all migrations V001–V017
        run: bash infra/db/migrate.sh

      - name: Verify V017 tables exist
        run: |
          psql "$DATABASE_URL" -c "
          SELECT table_name FROM information_schema.tables
          WHERE table_schema = 'public'
            AND table_name IN (
              'audit_engagements',
              'pbc_request_lists',
              'pbc_requests',
              'pbc_fulfillments',
              'audit_issues',
              'issue_responses',
              'workpaper_templates',
              'workpapers',
              'workpaper_sections'
            )
          ORDER BY table_name;" | tee /tmp/v017_tables.txt

          for table in \
            audit_engagements \
            pbc_request_lists \
            pbc_requests \
            pbc_fulfillments \
            audit_issues \
            issue_responses \
            workpaper_templates \
            workpapers \
            workpaper_sections; do
            grep -q "$table" /tmp/v017_tables.txt || \
              (echo "FATAL: V017 table '$table' not found" && exit 1)
          done
          echo "All V017 tables verified"

      - name: Assert count = 9 V017 tables
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*) FROM information_schema.tables
          WHERE table_schema='public'
            AND table_name IN (
              'audit_engagements',
              'pbc_request_lists',
              'pbc_requests',
              'pbc_fulfillments',
              'audit_issues',
              'issue_responses',
              'workpaper_templates',
              'workpapers',
              'workpaper_sections'
            );
          " | tr -d ' ')

          echo "V017 table count: $COUNT"
          if [ "$COUNT" -ne 9 ]; then
            echo "FATAL: Expected 9 V017 tables, found $COUNT"
            exit 1
          fi
          echo "V017 table count verified ($COUNT = 9)"

      - name: Verify seeded workpaper templates (>= 5)
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*) FROM workpaper_templates;
          " | tr -d ' ')

          echo "Seeded workpaper_templates count: $COUNT"
          if [ "$COUNT" -lt 5 ]; then
            echo "FATAL: Expected at least 5 seeded workpaper templates, found $COUNT"
            exit 1
          fi
          echo "Workpaper template seed verified ($COUNT >= 5)"

      - name: Verify immutability of pbc_fulfillments and issue_responses
        run: |
          for table in pbc_fulfillments issue_responses; do
            GRANTS=$(psql "$DATABASE_URL" -t -c "
            SELECT privilege_type
            FROM information_schema.role_table_grants
            WHERE table_name = '$table'
              AND grantee = 'aegis_app'
              AND privilege_type IN ('UPDATE', 'DELETE');
            " | tr -d ' ' | grep -v '^$' || true)

            if [ -n "$GRANTS" ]; then
              echo "FATAL: $table must be append-only — aegis_app has: $GRANTS"
              exit 1
            fi
            echo "$table immutability verified (no UPDATE/DELETE for aegis_app)"
          done

      - name: Verify RLS enabled on audit_issues
        run: |
          RLS=$(psql "$DATABASE_URL" -t -c "
          SELECT relrowsecurity FROM pg_class
          WHERE relname = 'audit_issues';
          " | tr -d ' ')

          echo "audit_issues RLS: $RLS"
          if [ "$RLS" != "t" ]; then
            echo "FATAL: RLS is not enabled on audit_issues (got '$RLS')"
            exit 1
          fi
          echo "RLS verified on audit_issues"

      - name: Verify UNIQUE constraint uq_list_request_number
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*)
          FROM information_schema.table_constraints
          WHERE constraint_name = 'uq_list_request_number'
            AND constraint_type = 'UNIQUE';
          " | tr -d ' ')

          echo "uq_list_request_number count: $COUNT"
          if [ "$COUNT" -ne 1 ]; then
            echo "FATAL: Expected exactly 1 uq_list_request_number constraint, found $COUNT"
            exit 1
          fi
          echo "uq_list_request_number constraint verified"

      - name: Verify UNIQUE constraint uq_engagement_issue_number
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*)
          FROM information_schema.table_constraints
          WHERE constraint_name = 'uq_engagement_issue_number'
            AND constraint_type = 'UNIQUE';
          " | tr -d ' ')

          echo "uq_engagement_issue_number count: $COUNT"
          if [ "$COUNT" -ne 1 ]; then
            echo "FATAL: Expected exactly 1 uq_engagement_issue_number constraint, found $COUNT"
            exit 1
          fi
          echo "uq_engagement_issue_number constraint verified"

  # ---------------------------------------------------------------------------
  # Job 2: PBC service Python unit tests (Sprint 13)
  # ---------------------------------------------------------------------------
  pbc-service-tests:
    name: "PBC Service Tests (Sprint 13)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/pbc-service/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -r services/pbc-service/requirements.txt

      - name: Run Sprint 13 tests
        run: |
          pytest tests/sprint13/ -v --tb=short
        env:
          DATABASE_URL: "postgresql://test:test@localhost/test"
          ANTHROPIC_API_KEY: "dummy"

  # ---------------------------------------------------------------------------
  # Job 3: TypeScript type-check for pbc-ui
  # ---------------------------------------------------------------------------
  typescript-typecheck:
    name: "TypeScript Type Check (pbc-ui)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/pbc-ui/package-lock.json

      - name: Install Node dependencies
        working-directory: services/pbc-ui
        run: npm ci

      - name: Run TypeScript type-check
        working-directory: services/pbc-ui
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Job 4: Docker build + Trivy CRITICAL scan (pbc-service)
  # ---------------------------------------------------------------------------
  docker-build-pbc-service:
    name: "Docker Build & Trivy Scan (pbc-service)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [pbc-service-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build pbc-service Docker image
        run: |
          docker build \
            -t aegis/pbc-service:ci \
            services/pbc-service

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/pbc-service:ci

  # ---------------------------------------------------------------------------
  # Job 5: Docker build + Trivy CRITICAL scan (pbc-ui)
  # ---------------------------------------------------------------------------
  docker-build-pbc-ui:
    name: "Docker Build & Trivy Scan (pbc-ui)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [typescript-typecheck]

    steps:
      - uses: actions/checkout@v4

      - name: Build pbc-ui Docker image
        run: |
          docker build \
            -t aegis/pbc-ui:ci \
            services/pbc-ui

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/pbc-ui:ci

  # ---------------------------------------------------------------------------
  # Job 6: Security gate — all 5 upstream jobs must succeed
  # ---------------------------------------------------------------------------
  security-gate:
    name: "Security Gate (Sprint 13)"
    runs-on: ubuntu-latest
    needs:
      - db-migrations
      - pbc-service-tests
      - typescript-typecheck
      - docker-build-pbc-service
      - docker-build-pbc-ui
    if: always()

    steps:
      - name: Check all Sprint 13 jobs passed
        run: |
          FAILED=0

          for job_and_result in \
            "db-migrations:${{ needs.db-migrations.result }}" \
            "pbc-service-tests:${{ needs.pbc-service-tests.result }}" \
            "typescript-typecheck:${{ needs.typescript-typecheck.result }}" \
            "docker-build-pbc-service:${{ needs.docker-build-pbc-service.result }}" \
            "docker-build-pbc-ui:${{ needs.docker-build-pbc-ui.result }}"; do
            JOB_NAME="${job_and_result%%:*}"
            JOB_RESULT="${job_and_result##*:}"
            if [ "$JOB_RESULT" != "success" ]; then
              echo "FATAL: Sprint 13 job '$JOB_NAME' did not pass (result: $JOB_RESULT)"
              FAILED=$((FAILED + 1))
            else
              echo "OK: $JOB_NAME passed"
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "$FAILED job(s) failed. Sprint 13 security gate blocked."
            exit 1
          fi

          echo ""
          echo "All Sprint 13 security gates passed."
