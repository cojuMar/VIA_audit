name: Sprint 14 — Enterprise Integration Hub

on:
  push:
    branches: [main, develop, 'sprint-14/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: DB migrations — V001–V018, verify V018 schema + immutability + constraints
  # ---------------------------------------------------------------------------
  db-migrations:
    name: "Database Migrations (V018 Integration Schema)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aegis
          POSTGRES_USER: aegis_admin
          POSTGRES_PASSWORD: aegis_dev_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Apply all migrations V001–V018
        run: bash infra/db/migrate.sh

      - name: Verify V018 tables exist
        run: |
          psql "$DATABASE_URL" -c "
          SELECT table_name FROM information_schema.tables
          WHERE table_schema = 'public'
            AND table_name IN (
              'connector_definitions',
              'tenant_integrations',
              'integration_sync_logs',
              'integration_records',
              'oauth_tokens',
              'webhook_events',
              'field_mapping_templates',
              'integration_data_mappings'
            )
          ORDER BY table_name;" | tee /tmp/v018_tables.txt

          for table in \
            connector_definitions \
            tenant_integrations \
            integration_sync_logs \
            integration_records \
            oauth_tokens \
            webhook_events \
            field_mapping_templates \
            integration_data_mappings; do
            grep -q "$table" /tmp/v018_tables.txt || \
              (echo "FATAL: V018 table '$table' not found" && exit 1)
          done
          echo "All V018 tables verified"

      - name: Assert count = 8 V018 tables
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*) FROM information_schema.tables
          WHERE table_schema = 'public'
            AND table_name IN (
              'connector_definitions',
              'tenant_integrations',
              'integration_sync_logs',
              'integration_records',
              'oauth_tokens',
              'webhook_events',
              'field_mapping_templates',
              'integration_data_mappings'
            );
          " | tr -d ' ')

          echo "V018 table count: $COUNT"
          if [ "$COUNT" -ne 8 ]; then
            echo "FATAL: Expected 8 V018 tables, found $COUNT"
            exit 1
          fi
          echo "V018 table count verified ($COUNT = 8)"

      - name: Verify seeded connectors (>= 22)
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*) FROM connector_definitions;
          " | tr -d ' ')

          echo "Seeded connector_definitions count: $COUNT"
          if [ "$COUNT" -lt 22 ]; then
            echo "FATAL: Expected at least 22 seeded connectors, found $COUNT"
            exit 1
          fi
          echo "Connector seed verified ($COUNT >= 22)"

      - name: Verify field mapping templates (>= 10)
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*) FROM field_mapping_templates;
          " | tr -d ' ')

          echo "Seeded field_mapping_templates count: $COUNT"
          if [ "$COUNT" -lt 10 ]; then
            echo "FATAL: Expected at least 10 field mapping templates (3 connectors x ~7 mappings), found $COUNT"
            exit 1
          fi
          echo "Field mapping template seed verified ($COUNT >= 10)"

      - name: Verify immutability of integration_sync_logs, integration_records, webhook_events
        run: |
          for table in integration_sync_logs integration_records webhook_events; do
            GRANTS=$(psql "$DATABASE_URL" -t -c "
            SELECT privilege_type
            FROM information_schema.role_table_grants
            WHERE table_name = '$table'
              AND grantee = 'aegis_app'
              AND privilege_type IN ('UPDATE', 'DELETE');
            " | tr -d ' ' | grep -v '^$' || true)

            if [ -n "$GRANTS" ]; then
              echo "FATAL: $table must be append-only — aegis_app has: $GRANTS"
              exit 1
            fi
            echo "$table immutability verified (no UPDATE/DELETE for aegis_app)"
          done

      - name: Verify UNIQUE constraint uq_integration_token on oauth_tokens
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*)
          FROM information_schema.table_constraints
          WHERE constraint_name = 'uq_integration_token'
            AND constraint_type = 'UNIQUE';
          " | tr -d ' ')

          echo "uq_integration_token count: $COUNT"
          if [ "$COUNT" -ne 1 ]; then
            echo "FATAL: Expected exactly 1 uq_integration_token constraint, found $COUNT"
            exit 1
          fi
          echo "uq_integration_token constraint verified"

  # ---------------------------------------------------------------------------
  # Job 2: Integration service Python unit tests (Sprint 14)
  # ---------------------------------------------------------------------------
  integration-service-tests:
    name: "Integration Service Tests (Sprint 14)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/integration-service/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -r services/integration-service/requirements.txt

      - name: Run Sprint 14 tests
        run: |
          pytest tests/sprint14/ -v --tb=short
        env:
          DATABASE_URL: "postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis"
          ENCRYPTION_KEY: "test-key-for-ci"
          SYNC_SCHEDULE_ENABLED: "false"

  # ---------------------------------------------------------------------------
  # Job 3: TypeScript type-check for integration-ui
  # ---------------------------------------------------------------------------
  typescript-typecheck:
    name: "TypeScript Type Check (integration-ui)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/integration-ui/package-lock.json

      - name: Install Node dependencies
        working-directory: services/integration-ui
        run: npm ci

      - name: Run TypeScript type-check
        working-directory: services/integration-ui
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Job 4: Docker build + Trivy CRITICAL scan (integration-service)
  # ---------------------------------------------------------------------------
  docker-build-integration-service:
    name: "Docker Build & Trivy Scan (integration-service)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [integration-service-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build integration-service Docker image
        run: |
          docker build \
            -t aegis/integration-service:ci \
            services/integration-service

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/integration-service:ci

  # ---------------------------------------------------------------------------
  # Job 5: Docker build + Trivy CRITICAL scan (integration-ui)
  # ---------------------------------------------------------------------------
  docker-build-integration-ui:
    name: "Docker Build & Trivy Scan (integration-ui)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [typescript-typecheck]

    steps:
      - uses: actions/checkout@v4

      - name: Build integration-ui Docker image
        run: |
          docker build \
            -t aegis/integration-ui:ci \
            services/integration-ui

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/integration-ui:ci

  # ---------------------------------------------------------------------------
  # Job 6: Security gate — all 5 upstream jobs must succeed
  # ---------------------------------------------------------------------------
  security-gate:
    name: "Security Gate (Sprint 14)"
    runs-on: ubuntu-latest
    needs:
      - db-migrations
      - integration-service-tests
      - typescript-typecheck
      - docker-build-integration-service
      - docker-build-integration-ui
    if: always()

    steps:
      - name: Check all Sprint 14 jobs passed
        run: |
          FAILED=0

          for job_and_result in \
            "db-migrations:${{ needs.db-migrations.result }}" \
            "integration-service-tests:${{ needs.integration-service-tests.result }}" \
            "typescript-typecheck:${{ needs.typescript-typecheck.result }}" \
            "docker-build-integration-service:${{ needs.docker-build-integration-service.result }}" \
            "docker-build-integration-ui:${{ needs.docker-build-integration-ui.result }}"; do
            JOB_NAME="${job_and_result%%:*}"
            JOB_RESULT="${job_and_result##*:}"
            if [ "$JOB_RESULT" != "success" ]; then
              echo "FATAL: Sprint 14 job '$JOB_NAME' did not pass (result: $JOB_RESULT)"
              FAILED=$((FAILED + 1))
            else
              echo "OK: $JOB_NAME passed"
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "$FAILED job(s) failed. Sprint 14 security gate blocked."
            exit 1
          fi

          echo ""
          echo "All Sprint 14 security gates passed."
