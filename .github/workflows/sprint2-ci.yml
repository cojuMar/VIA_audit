name: Sprint 2 — Zero-Touch Evidence Engine

on:
  push:
    branches: [main, develop, 'sprint-2/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis
  KAFKA_BOOTSTRAP_SERVERS: localhost:9092
  MINIO_ENDPOINT: http://localhost:9000
  MINIO_ACCESS_KEY: aegis_minio
  MINIO_SECRET_KEY: aegis_minio_dev_pw
  VAULT_ADDR: http://localhost:8200
  VAULT_TOKEN: aegis-dev-root-token
  NODE_ENV: test

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: DB migrations (Sprint 2 additions)
  # ---------------------------------------------------------------------------
  db-migrations:
    name: "🗄️ Database Migrations (V005, V006)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aegis
          POSTGRES_USER: aegis_admin
          POSTGRES_PASSWORD: aegis_dev_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - name: Apply all migrations (Sprint 1 + Sprint 2)
        run: bash infra/db/migrate.sh

      - name: Verify Sprint 2 tables exist
        run: |
          psql "$DATABASE_URL" -c "
          SELECT table_name FROM information_schema.tables
          WHERE table_schema='public'
          AND table_name IN (
            'connector_registry','ingestion_runs','ingestion_watermarks',
            'connector_schemas','zk_proofs','zk_circuit_registry'
          )
          ORDER BY table_name;" | tee /tmp/tables.txt

          for table in connector_registry ingestion_runs ingestion_watermarks zk_proofs zk_circuit_registry; do
            grep -q "$table" /tmp/tables.txt || (echo "FATAL: Table $table not found" && exit 1)
          done
          echo "All Sprint 2 tables verified ✓"

      - name: Verify ZK circuit registry seeded
        run: |
          count=$(psql "$DATABASE_URL" -t -c "SELECT COUNT(*) FROM zk_circuit_registry")
          [ "$count" -ge 3 ] || (echo "FATAL: zk_circuit_registry should have ≥3 entries" && exit 1)
          echo "ZK circuit registry has $count entries ✓"

  # ---------------------------------------------------------------------------
  # Job 2: Hash-chain unit tests (Python)
  # ---------------------------------------------------------------------------
  hash-chain-tests:
    name: "🔗 Hash-Chain Integrity Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run hash-chain tests
        run: pytest tests/sprint2/test_hash_chain.py -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 3: Connector SDK tests (Python)
  # ---------------------------------------------------------------------------
  connector-sdk-tests:
    name: "🔌 Connector SDK Contract Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/ingestion-orchestrator/requirements.txt

      - name: Install dependencies
        run: |
          cd services/ingestion-orchestrator
          pip install -r requirements.txt pytest pytest-asyncio

      - name: Import sanity check
        run: |
          cd services/ingestion-orchestrator
          python -c "
          from src.connector_base import ConnectorBase
          from src.canonical_schema import CanonicalEvidenceRecord
          from src.connectors.registry import CONNECTOR_REGISTRY, list_connector_types
          print('Registered connectors:', list_connector_types())
          assert len(CONNECTOR_REGISTRY) >= 4, 'Expected at least 4 connectors'
          "
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
          VAULT_TOKEN: "dummy"
          VAULT_ADDR: "http://localhost:8200"
          MINIO_ENDPOINT: "http://localhost:9000"
          MINIO_ACCESS_KEY: "dummy"
          MINIO_SECRET_KEY: "dummy"
          EVIDENCE_STORE_URL: "http://localhost:3005"

      - name: Run connector contract tests
        run: |
          cd services/ingestion-orchestrator
          pytest ../../tests/sprint2/test_connector_sdk.py -v --tb=short
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
          VAULT_TOKEN: "dummy"
          VAULT_ADDR: "http://localhost:8200"
          MINIO_ENDPOINT: "http://localhost:9000"
          MINIO_ACCESS_KEY: "dummy"
          MINIO_SECRET_KEY: "dummy"
          EVIDENCE_STORE_URL: "http://localhost:3005"

  # ---------------------------------------------------------------------------
  # Job 4: ZK-proof-worker Rust unit tests (fast, MockProver only)
  # ---------------------------------------------------------------------------
  zk-worker-fast-tests:
    name: "🔐 ZK Worker Fast Tests (MockProver)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: services/zk-proof-worker

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/zk-proof-worker

      - name: Build (check compiles)
        run: cargo build

      - name: Run fast unit tests (excludes #[ignore] slow tests)
        run: cargo test --lib -- --skip ignored
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
          MINIO_ENDPOINT: "http://localhost:9000"
          MINIO_ACCESS_KEY: "dummy"
          MINIO_SECRET_KEY: "dummy"
          ZK_WORKER_MAX_RAM_GB: "14"
          ZK_WORKER_MAX_BATCH_SIZE: "262144"

  # ---------------------------------------------------------------------------
  # Job 5: ZK-proof slow tests (full prove+verify roundtrip)
  # Runs on a high-memory runner. Not on the critical path.
  # ---------------------------------------------------------------------------
  zk-worker-slow-tests:
    name: "🔐 ZK Worker Slow Tests (full prove+verify)"
    runs-on: ubuntu-latest  # swap for a 16GB runner in production
    timeout-minutes: 60
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: services/zk-proof-worker
    needs: [zk-worker-fast-tests]

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/zk-proof-worker

      - name: Build (release mode for acceptable proof times)
        run: cargo build --release

      - name: Run ignored (slow) tests
        run: cargo test --release -- --ignored --nocapture
        env:
          RUST_LOG: info
          ZK_WORKER_MAX_RAM_GB: "14"
          ZK_WORKER_MAX_BATCH_SIZE: "262144"

  # ---------------------------------------------------------------------------
  # Job 6: Evidence store service tests
  # ---------------------------------------------------------------------------
  evidence-store-tests:
    name: "📦 Evidence Store Service Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/evidence-store/requirements.txt

      - name: Install dependencies
        run: |
          cd services/evidence-store
          pip install -r requirements.txt pytest pytest-asyncio

      - name: Import check
        run: |
          cd services/evidence-store
          python -c "
          import src.hasher as h
          import src.models
          import src.config
          print('Import check passed')
          "
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          MINIO_ENDPOINT: "http://localhost:9000"
          MINIO_ACCESS_KEY: "dummy"
          MINIO_SECRET_KEY: "dummy"
          AUTH_SERVICE_JWKS_URL: "http://localhost:3001/.well-known/jwks.json"
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"

  # ---------------------------------------------------------------------------
  # Job 7: Docker builds for Sprint 2 services
  # ---------------------------------------------------------------------------
  docker-builds:
    name: "🐳 Docker Build Validation (Sprint 2)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [hash-chain-tests, connector-sdk-tests, zk-worker-fast-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build ingestion-orchestrator
        run: docker build -t aegis/ingestion-orchestrator:ci services/ingestion-orchestrator

      - name: Build evidence-store
        run: docker build -t aegis/evidence-store:ci services/evidence-store

      - name: Build zk-proof-worker (Rust — longest build)
        run: docker build -t aegis/zk-proof-worker:ci services/zk-proof-worker
        timeout-minutes: 20

      - name: Scan for critical CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: aegis/ingestion-orchestrator:ci
          format: table
          exit-code: '1'
          severity: CRITICAL

  # ---------------------------------------------------------------------------
  # Job 8: [CRITICAL] Amount isolation check
  # Verifies that transaction amounts never appear in non-metadata fields.
  # This enforces the ZK private input isolation requirement.
  # ---------------------------------------------------------------------------
  amount-isolation-gate:
    name: "🔒 [CRITICAL] ZK Amount Isolation Check"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [connector-sdk-tests]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd services/ingestion-orchestrator
          pip install -r requirements.txt

      - name: "[CRITICAL] Verify amounts are isolated to metadata"
        run: |
          cd services/ingestion-orchestrator
          python -c "
          import sys
          sys.exit(0)  # Full test is in test_connector_sdk.py::TestPlaidConnector::test_amount_isolation_for_zk
          "
          pytest ../../tests/sprint2/test_connector_sdk.py::TestPlaidConnector::test_amount_isolation_for_zk -v
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
          VAULT_TOKEN: "dummy"
          VAULT_ADDR: "http://localhost:8200"
          MINIO_ENDPOINT: "http://localhost:9000"
          MINIO_ACCESS_KEY: "dummy"
          MINIO_SECRET_KEY: "dummy"
          EVIDENCE_STORE_URL: "http://localhost:3005"

  # ---------------------------------------------------------------------------
  # Security gate
  # ---------------------------------------------------------------------------
  security-gate:
    name: "🚨 Security Gate (Sprint 2)"
    runs-on: ubuntu-latest
    needs: [db-migrations, hash-chain-tests, zk-worker-fast-tests, amount-isolation-gate, docker-builds]
    if: always()

    steps:
      - name: Check all critical jobs passed
        run: |
          for job_result in \
            "${{ needs.db-migrations.result }}" \
            "${{ needs.hash-chain-tests.result }}" \
            "${{ needs.zk-worker-fast-tests.result }}" \
            "${{ needs.amount-isolation-gate.result }}" \
            "${{ needs.docker-builds.result }}"; do
            if [ "$job_result" != "success" ]; then
              echo "FATAL: A critical Sprint 2 job failed: $job_result"
              exit 1
            fi
          done
          echo "All Sprint 2 security gates passed ✓"
