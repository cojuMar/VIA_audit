name: Sprint 4 — RAG Pipeline & Guardrails

on:
  push:
    branches: [main, develop, 'sprint-4/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis
  NODE_ENV: test

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: DB migrations (V008 — RAG schema + pgvector)
  # ---------------------------------------------------------------------------
  db-migrations:
    name: "🗄️ Database Migrations (V008 RAG Schema)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: aegis
          POSTGRES_USER: aegis_admin
          POSTGRES_PASSWORD: aegis_dev_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - name: Apply all migrations
        run: bash infra/db/migrate.sh

      - name: Verify V008 tables exist
        run: |
          psql "$DATABASE_URL" -c "
          SELECT table_name FROM information_schema.tables
          WHERE table_schema='public'
          AND table_name IN (
            'evidence_embeddings','audit_narratives','rag_citations',
            'hitl_narrative_queue','embedding_jobs'
          )
          ORDER BY table_name;" | tee /tmp/tables.txt

          for table in audit_narratives embedding_jobs evidence_embeddings hitl_narrative_queue rag_citations; do
            grep -q "$table" /tmp/tables.txt || (echo "FATAL: Table $table not found" && exit 1)
          done
          echo "All V008 tables verified ✓"

      - name: Verify pgvector extension
        run: |
          psql "$DATABASE_URL" -c "SELECT extname FROM pg_extension WHERE extname='vector';" | \
            grep -q vector || (echo "FATAL: pgvector extension not installed" && exit 1)
          echo "pgvector extension verified ✓"

      - name: Verify IVFFLAT index exists
        run: |
          psql "$DATABASE_URL" -c "
          SELECT indexname FROM pg_indexes
          WHERE tablename = 'evidence_embeddings'
          AND indexdef LIKE '%ivfflat%';" | \
            grep -q idx_evidence_embeddings_vector || \
            (echo "FATAL: IVFFLAT index not found" && exit 1)
          echo "IVFFLAT index verified ✓"

  # ---------------------------------------------------------------------------
  # Job 2: Guardrail unit tests (no external API)
  # ---------------------------------------------------------------------------
  guardrail-unit-tests:
    name: "🔒 Hallucination Guardrail Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/rag-pipeline-service/requirements.txt

      - name: Install dependencies
        run: |
          cd services/rag-pipeline-service
          pip install -r requirements.txt pytest pytest-asyncio

      - name: Run guardrail tests (mocked API)
        run: |
          cd services/rag-pipeline-service
          pytest ../../tests/sprint4/test_hallucination_guardrail.py -v --tb=short \
            --asyncio-mode=auto
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          ANTHROPIC_API_KEY: "sk-dummy-key-for-testing"
          VOYAGE_API_KEY: "dummy"
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"

  # ---------------------------------------------------------------------------
  # Job 3: RAG pipeline tests (no external API)
  # ---------------------------------------------------------------------------
  rag-pipeline-tests:
    name: "🔍 RAG Pipeline Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/rag-pipeline-service/requirements.txt

      - name: Install dependencies
        run: |
          cd services/rag-pipeline-service
          pip install -r requirements.txt pytest pytest-asyncio

      - name: Run pipeline tests
        run: |
          cd services/rag-pipeline-service
          pytest ../../tests/sprint4/test_rag_pipeline.py -v --tb=short \
            --asyncio-mode=auto
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          ANTHROPIC_API_KEY: "sk-dummy-key-for-testing"
          VOYAGE_API_KEY: "dummy"
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"

  # ---------------------------------------------------------------------------
  # Job 4: [CRITICAL] Hallucination guardrail gate
  # Verifies that the conservative failure mode is enforced:
  # API errors → hitl_required=True (never silently approve).
  # ---------------------------------------------------------------------------
  hallucination-guardrail-gate:
    name: "🚨 [CRITICAL] Hallucination Guardrail Safety Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [guardrail-unit-tests]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/rag-pipeline-service/requirements.txt

      - name: Install dependencies
        run: |
          cd services/rag-pipeline-service
          pip install -r requirements.txt pytest pytest-asyncio

      - name: "[CRITICAL] Guardrail conservative failure mode"
        run: |
          cd services/rag-pipeline-service
          pytest ../../tests/sprint4/test_hallucination_guardrail.py::TestGuardrailCheck::test_api_error_is_conservative \
                 ../../tests/sprint4/test_hallucination_guardrail.py::TestGuardrailCheck::test_fabricated_claim_triggers_hitl \
                 ../../tests/sprint4/test_hallucination_guardrail.py::TestGuardrailCheck::test_no_claims_extracted_triggers_hitl \
                 -v --tb=long --asyncio-mode=auto
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          ANTHROPIC_API_KEY: "sk-dummy-key-for-testing"
          VOYAGE_API_KEY: "dummy"
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"

      - name: "[CRITICAL] Amount isolation in narrative pipeline"
        run: |
          cd services/rag-pipeline-service
          pytest ../../tests/sprint4/test_rag_pipeline.py::TestAmountIsolationInNarrative -v --tb=long \
            --asyncio-mode=auto
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          ANTHROPIC_API_KEY: "sk-dummy-key-for-testing"
          VOYAGE_API_KEY: "dummy"
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"

  # ---------------------------------------------------------------------------
  # Job 5: Docker build + CVE scan
  # ---------------------------------------------------------------------------
  docker-build:
    name: "🐳 Docker Build (rag-pipeline-service)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [guardrail-unit-tests, rag-pipeline-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build rag-pipeline-service image
        run: docker build -t aegis/rag-pipeline-service:ci services/rag-pipeline-service

      - name: Scan for critical CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: aegis/rag-pipeline-service:ci
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # Security gate
  # ---------------------------------------------------------------------------
  security-gate:
    name: "🚨 Security Gate (Sprint 4)"
    runs-on: ubuntu-latest
    needs: [db-migrations, guardrail-unit-tests, rag-pipeline-tests, hallucination-guardrail-gate, docker-build]
    if: always()

    steps:
      - name: Check all critical jobs passed
        run: |
          for job_result in \
            "${{ needs.db-migrations.result }}" \
            "${{ needs.guardrail-unit-tests.result }}" \
            "${{ needs.rag-pipeline-tests.result }}" \
            "${{ needs.hallucination-guardrail-gate.result }}" \
            "${{ needs.docker-build.result }}"; do
            if [ "$job_result" != "success" ]; then
              echo "FATAL: A critical Sprint 4 job failed: $job_result"
              exit 1
            fi
          done
          echo "All Sprint 4 security gates passed ✓"
