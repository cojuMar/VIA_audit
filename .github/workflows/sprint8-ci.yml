name: Sprint 8 — Compliance Framework Engine

on:
  push:
    branches: [main, develop, 'sprint-8/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: DB migrations — V012 Compliance Framework Schema
  # ---------------------------------------------------------------------------
  db-migrations:
    name: "Database Migrations (V012 Compliance Framework Schema)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aegis
          POSTGRES_USER: aegis_admin
          POSTGRES_PASSWORD: aegis_dev_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Apply all migrations
        run: bash infra/db/migrate.sh

      - name: Verify V012 tables exist
        run: |
          psql "$DATABASE_URL" -c "
          SELECT table_name FROM information_schema.tables
          WHERE table_schema = 'public'
            AND table_name IN (
              'compliance_frameworks',
              'framework_controls',
              'control_crosswalk',
              'tenant_frameworks',
              'tenant_control_evidence',
              'compliance_scores',
              'compliance_calendar_events',
              'framework_gap_items'
            )
          ORDER BY table_name;" | tee /tmp/v012_tables.txt

          for table in \
            compliance_frameworks \
            framework_controls \
            control_crosswalk \
            tenant_frameworks \
            tenant_control_evidence \
            compliance_scores \
            compliance_calendar_events \
            framework_gap_items; do
            grep -q "$table" /tmp/v012_tables.txt || \
              (echo "FATAL: V012 table '$table' not found" && exit 1)
          done
          echo "All V012 tables verified"

      - name: Verify seeded frameworks (>= 20)
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c \
            "SELECT COUNT(*) FROM compliance_frameworks;" | tr -d ' ')
          echo "Seeded framework count: $COUNT"
          if [ "$COUNT" -lt 20 ]; then
            echo "FATAL: Expected >= 20 seeded frameworks, found $COUNT"
            exit 1
          fi
          echo "Framework seed count verified ($COUNT >= 20)"

      - name: Verify RLS on tenant-scoped tables
        run: |
          psql "$DATABASE_URL" -c "
          SELECT c.relname, c.relrowsecurity, c.relforcerowsecurity
          FROM pg_class c
          JOIN pg_namespace n ON n.oid = c.relnamespace
          WHERE n.nspname = 'public'
            AND c.relname IN (
              'tenant_frameworks',
              'tenant_control_evidence',
              'compliance_scores',
              'compliance_calendar_events',
              'framework_gap_items'
            )
          ORDER BY c.relname;" | tee /tmp/rls_check.txt

          for table in \
            tenant_frameworks \
            tenant_control_evidence \
            compliance_scores \
            compliance_calendar_events \
            framework_gap_items; do
            ROW=$(grep "$table" /tmp/rls_check.txt || true)
            if [ -z "$ROW" ]; then
              echo "FATAL: $table not found in pg_class (RLS check)"
              exit 1
            fi
            if ! echo "$ROW" | grep -q "| t "; then
              echo "FATAL: RLS is not enabled on table '$table'"
              exit 1
            fi
          done
          echo "RLS verified on all tenant-scoped V012 tables"

      - name: Assert compliance_scores has no UPDATE/DELETE grants (immutable snapshots)
        run: |
          GRANTS=$(psql "$DATABASE_URL" -t -c "
          SELECT privilege_type
          FROM information_schema.role_table_grants
          WHERE table_name = 'compliance_scores'
            AND grantee = 'aegis_app'
            AND privilege_type IN ('UPDATE', 'DELETE');
          " | tr -d ' ' | grep -v '^$' || true)

          if [ -n "$GRANTS" ]; then
            echo "FATAL: compliance_scores must be immutable — aegis_app has: $GRANTS"
            exit 1
          fi
          echo "compliance_scores immutability verified (no UPDATE/DELETE for aegis_app)"

  # ---------------------------------------------------------------------------
  # Job 2: Framework service unit tests
  # ---------------------------------------------------------------------------
  framework-service-tests:
    name: "Framework Service Tests (Sprint 8)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/framework-service/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r services/framework-service/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run Sprint 8 tests
        run: |
          pytest tests/sprint8/ -v --tb=short
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
          ANTHROPIC_API_KEY: "dummy"
          VOYAGE_API_KEY: "dummy"
          REDIS_URL: "redis://localhost:6379/3"
          VAULT_ADDR: "http://localhost:8200"
          VAULT_TOKEN: "dev-root-token"
          MINIO_ENDPOINT: "http://localhost:9000"
          MINIO_ACCESS_KEY: "minioadmin"
          MINIO_SECRET_KEY: "minioadmin"
          FRAMEWORKS_DIR: "./frameworks"

  # ---------------------------------------------------------------------------
  # Job 3: YAML framework validation
  # ---------------------------------------------------------------------------
  yaml-validation:
    name: "Framework YAML Validation"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate all framework YAML files
        run: |
          python - <<'PYEOF'
          import os
          import sys
          import yaml
          from pathlib import Path

          FRAMEWORKS_DIR = Path("frameworks")
          MIN_CONTROLS = 10
          REQUIRED_FRAMEWORK_KEYS = {"slug", "name", "controls"}
          REQUIRED_CONTROL_KEYS  = {"id", "title", "domain", "description"}

          yaml_files = sorted(FRAMEWORKS_DIR.glob("*.yaml"))
          if not yaml_files:
              print(f"ERROR: No .yaml files found in {FRAMEWORKS_DIR}/")
              sys.exit(1)

          total_controls = 0
          errors = []

          for path in yaml_files:
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      data = yaml.safe_load(f)
              except Exception as e:
                  errors.append(f"{path.name}: YAML parse error — {e}")
                  continue

              # Framework-level assertions
              for key in REQUIRED_FRAMEWORK_KEYS:
                  if not data.get(key):
                      errors.append(f"{path.name}: missing or empty '{key}'")

              controls = data.get("controls", [])
              if not isinstance(controls, list) or len(controls) < MIN_CONTROLS:
                  errors.append(
                      f"{path.name}: controls must be a list with >= {MIN_CONTROLS} items "
                      f"(found {len(controls) if isinstance(controls, list) else type(controls).__name__})"
                  )

              # Control-level assertions
              for ctrl in controls:
                  for key in REQUIRED_CONTROL_KEYS:
                      val = ctrl.get(key)
                      if not val or (isinstance(val, str) and not val.strip()):
                          errors.append(
                              f"{path.name} / control '{ctrl.get('id', '?')}': "
                              f"missing or empty required field '{key}'"
                          )

              total_controls += len(controls)

          if errors:
              print(f"\nValidation FAILED with {len(errors)} error(s):\n")
              for err in errors:
                  print(f"  - {err}")
              sys.exit(1)

          print(f"Validated {len(yaml_files)} frameworks, {total_controls} total controls")
          PYEOF

  # ---------------------------------------------------------------------------
  # Job 4: TypeScript type-check for framework-ui
  # ---------------------------------------------------------------------------
  typescript-typecheck:
    name: "TypeScript Type Check (framework-ui)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/framework-ui/package-lock.json

      - name: Install Node dependencies
        working-directory: services/framework-ui
        run: npm ci

      - name: Run TypeScript type-check
        working-directory: services/framework-ui
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Job 5: Docker build + Trivy CRITICAL scan
  # ---------------------------------------------------------------------------
  docker-build:
    name: "Docker Build & Trivy Scan (framework-service)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [framework-service-tests, yaml-validation]

    steps:
      - uses: actions/checkout@v4

      - name: Build framework-service Docker image
        run: |
          docker build \
            -t aegis/framework-service:ci \
            services/framework-service

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/framework-service:ci

  # ---------------------------------------------------------------------------
  # Job 6: Compliance gate — all 5 jobs must pass
  # ---------------------------------------------------------------------------
  compliance-gate:
    name: "Compliance Gate (Sprint 8)"
    runs-on: ubuntu-latest
    needs:
      - db-migrations
      - framework-service-tests
      - yaml-validation
      - typescript-typecheck
      - docker-build
    if: always()

    steps:
      - name: Check all Sprint 8 jobs passed
        run: |
          FAILED=0

          for job_and_result in \
            "db-migrations:${{ needs.db-migrations.result }}" \
            "framework-service-tests:${{ needs.framework-service-tests.result }}" \
            "yaml-validation:${{ needs.yaml-validation.result }}" \
            "typescript-typecheck:${{ needs.typescript-typecheck.result }}" \
            "docker-build:${{ needs.docker-build.result }}"; do
            JOB_NAME="${job_and_result%%:*}"
            JOB_RESULT="${job_and_result##*:}"
            if [ "$JOB_RESULT" != "success" ]; then
              echo "FATAL: Sprint 8 job '$JOB_NAME' did not pass (result: $JOB_RESULT)"
              FAILED=$((FAILED + 1))
            else
              echo "OK: $JOB_NAME passed"
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "$FAILED job(s) failed. Sprint 8 compliance gate blocked."
            exit 1
          fi

          echo ""
          echo "All Sprint 8 compliance gates passed."
