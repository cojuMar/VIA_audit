name: Sprint 16 — Risk Management Engine

on:
  push:
    branches: [main, develop, 'sprint-16/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: DB migrations — V001–V020, verify V020 risk schema
  # ---------------------------------------------------------------------------
  db-migrations:
    name: "Database Migrations (V020 Risk Schema)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aegis
          POSTGRES_USER: aegis_admin
          POSTGRES_PASSWORD: aegis_dev_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Apply all migrations V001–V020
        run: bash infra/db/migrate.sh

      - name: Verify V020 tables exist (count = 8)
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*) FROM information_schema.tables
          WHERE table_schema = 'public'
            AND table_name IN (
              'risk_categories',
              'risk_appetite_statements',
              'risks',
              'risk_assessments',
              'risk_treatments',
              'risk_score_history',
              'risk_indicators',
              'risk_indicator_readings'
            );
          " | tr -d ' ')

          echo "V020 table count: $COUNT"
          if [ "$COUNT" -ne 8 ]; then
            echo "FATAL: Expected 8 V020 tables, found $COUNT"
            exit 1
          fi
          echo "V020 table count verified ($COUNT = 8)"

      - name: Verify seeded risk_categories (count ≥ 10)
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*) FROM risk_categories;
          " | tr -d ' ')

          echo "risk_categories row count: $COUNT"
          if [ "$COUNT" -lt 10 ]; then
            echo "FATAL: Expected at least 10 seeded risk categories, found $COUNT"
            exit 1
          fi
          echo "risk_categories seed verified ($COUNT ≥ 10)"

      - name: Verify immutability of risk_assessments, risk_score_history, risk_indicator_readings
        run: |
          for table in risk_assessments risk_score_history risk_indicator_readings; do
            GRANTS=$(psql "$DATABASE_URL" -t -c "
            SELECT privilege_type
            FROM information_schema.role_table_grants
            WHERE table_name = '$table'
              AND grantee = 'aegis_app'
              AND privilege_type IN ('UPDATE', 'DELETE');
            " | tr -d ' ' | grep -v '^$' || true)

            if [ -n "$GRANTS" ]; then
              echo "FATAL: $table must be append-only — aegis_app has: $GRANTS"
              exit 1
            fi
            echo "$table immutability verified (no UPDATE/DELETE for aegis_app)"
          done

      - name: Verify GENERATED ALWAYS column inherent_score on risks
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*)
          FROM information_schema.columns
          WHERE table_name   = 'risks'
            AND column_name  = 'inherent_score'
            AND is_generated = 'ALWAYS';
          " | tr -d ' ')

          echo "GENERATED ALWAYS column count for inherent_score: $COUNT"
          if [ "$COUNT" -ne 1 ]; then
            echo "FATAL: inherent_score must be GENERATED ALWAYS (found $COUNT)"
            exit 1
          fi
          echo "GENERATED ALWAYS column inherent_score verified"

      - name: Verify UNIQUE constraint uq_tenant_risk_id on risks
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*)
          FROM information_schema.table_constraints
          WHERE table_name      = 'risks'
            AND constraint_name = 'uq_tenant_risk_id'
            AND constraint_type = 'UNIQUE';
          " | tr -d ' ')

          echo "uq_tenant_risk_id constraint count: $COUNT"
          if [ "$COUNT" -ne 1 ]; then
            echo "FATAL: UNIQUE constraint uq_tenant_risk_id not found on risks"
            exit 1
          fi
          echo "UNIQUE constraint uq_tenant_risk_id verified"

  # ---------------------------------------------------------------------------
  # Job 2: Risk service Python unit tests (Sprint 16)
  # ---------------------------------------------------------------------------
  risk-service-tests:
    name: "Risk Service Tests (Sprint 16)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/risk-service/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -r services/risk-service/requirements.txt

      - name: Run Sprint 16 tests
        run: |
          pytest tests/sprint16/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: "dummy"
          DATABASE_URL: "postgresql://test:test@localhost/test"

  # ---------------------------------------------------------------------------
  # Job 3: TypeScript type-check for risk-ui
  # ---------------------------------------------------------------------------
  typescript-typecheck:
    name: "TypeScript Type Check (risk-ui)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/risk-ui/package-lock.json

      - name: Install Node dependencies
        working-directory: services/risk-ui
        run: npm ci

      - name: Run TypeScript type-check
        working-directory: services/risk-ui
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Job 4: Docker build + Trivy CRITICAL scan (risk-service)
  # ---------------------------------------------------------------------------
  docker-build-risk-service:
    name: "Docker Build & Trivy Scan (risk-service)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [risk-service-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build risk-service Docker image
        run: |
          docker build \
            -t aegis/risk-service:ci \
            services/risk-service

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/risk-service:ci

  # ---------------------------------------------------------------------------
  # Job 5: Docker build + Trivy CRITICAL scan (risk-ui)
  # ---------------------------------------------------------------------------
  docker-build-risk-ui:
    name: "Docker Build & Trivy Scan (risk-ui)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [typescript-typecheck]

    steps:
      - uses: actions/checkout@v4

      - name: Build risk-ui Docker image
        run: |
          docker build \
            -t aegis/risk-ui:ci \
            services/risk-ui

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/risk-ui:ci

  # ---------------------------------------------------------------------------
  # Job 6: Security gate — all 5 upstream jobs must succeed
  # ---------------------------------------------------------------------------
  security-gate:
    name: "Security Gate (Sprint 16)"
    runs-on: ubuntu-latest
    needs:
      - db-migrations
      - risk-service-tests
      - typescript-typecheck
      - docker-build-risk-service
      - docker-build-risk-ui
    if: always()

    steps:
      - name: Check all Sprint 16 jobs passed
        run: |
          FAILED=0

          for job_and_result in \
            "db-migrations:${{ needs.db-migrations.result }}" \
            "risk-service-tests:${{ needs.risk-service-tests.result }}" \
            "typescript-typecheck:${{ needs.typescript-typecheck.result }}" \
            "docker-build-risk-service:${{ needs.docker-build-risk-service.result }}" \
            "docker-build-risk-ui:${{ needs.docker-build-risk-ui.result }}"; do
            JOB_NAME="${job_and_result%%:*}"
            JOB_RESULT="${job_and_result##*:}"
            if [ "$JOB_RESULT" != "success" ]; then
              echo "FATAL: Sprint 16 job '$JOB_NAME' did not pass (result: $JOB_RESULT)"
              FAILED=$((FAILED + 1))
            else
              echo "OK: $JOB_NAME passed"
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "$FAILED job(s) failed. Sprint 16 security gate blocked."
            exit 1
          fi

          echo ""
          echo "All Sprint 16 security gates passed."
