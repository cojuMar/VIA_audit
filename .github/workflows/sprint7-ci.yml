name: Sprint 7 — MAESTRO Security Hardening

on:
  push:
    branches: [main, develop, 'sprint-7/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: DB migrations — V011 Security Hardening Schema
  # ---------------------------------------------------------------------------
  db-migrations:
    name: "Database Migrations (V011 Security Hardening Schema)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aegis
          POSTGRES_USER: aegis_admin
          POSTGRES_PASSWORD: aegis_dev_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Apply all migrations
        run: bash infra/db/migrate.sh

      - name: Verify V011 tables exist
        run: |
          psql "$DATABASE_URL" -c "
          SELECT table_name FROM information_schema.tables
          WHERE table_schema = 'public'
            AND table_name IN (
              'prompt_injection_logs',
              'rate_limit_events',
              'pq_public_keys',
              'security_audit_log'
            )
          ORDER BY table_name;" | tee /tmp/v011_tables.txt

          for table in prompt_injection_logs rate_limit_events pq_public_keys security_audit_log; do
            grep -q "$table" /tmp/v011_tables.txt || \
              (echo "FATAL: V011 table '$table' not found" && exit 1)
          done
          echo "All V011 tables verified"

      - name: Verify RLS is enabled on all V011 tables
        run: |
          psql "$DATABASE_URL" -c "
          SELECT c.relname, c.relrowsecurity, c.relforcerowsecurity
          FROM pg_class c
          JOIN pg_namespace n ON n.oid = c.relnamespace
          WHERE n.nspname = 'public'
            AND c.relname IN (
              'prompt_injection_logs',
              'rate_limit_events',
              'pq_public_keys',
              'security_audit_log'
            )
          ORDER BY c.relname;" | tee /tmp/rls_check.txt

          # All four tables must have relrowsecurity = t
          for table in prompt_injection_logs rate_limit_events pq_public_keys security_audit_log; do
            ROW=$(grep "$table" /tmp/rls_check.txt || true)
            if [ -z "$ROW" ]; then
              echo "FATAL: $table not found in pg_class (RLS check)"
              exit 1
            fi
            # pg outputs 't' for true boolean columns in table format
            if ! echo "$ROW" | grep -q "| t "; then
              echo "FATAL: RLS is not enabled on table '$table'"
              exit 1
            fi
          done
          echo "RLS verified on all V011 tables"

      - name: Assert security_audit_log has no UPDATE/DELETE grants to aegis_app
        run: |
          GRANTS=$(psql "$DATABASE_URL" -t -c "
          SELECT privilege_type
          FROM information_schema.role_table_grants
          WHERE table_name = 'security_audit_log'
            AND grantee = 'aegis_app'
            AND privilege_type IN ('UPDATE', 'DELETE');
          " | tr -d ' ' | grep -v '^$' || true)

          if [ -n "$GRANTS" ]; then
            echo "FATAL: security_audit_log must be immutable — aegis_app has: $GRANTS"
            exit 1
          fi
          echo "security_audit_log immutability verified (no UPDATE/DELETE for aegis_app)"

  # ---------------------------------------------------------------------------
  # Job 2: Prompt injection filter unit tests
  # ---------------------------------------------------------------------------
  prompt-injection-tests:
    name: "Prompt Injection Filter Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/rag-pipeline-service/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r services/rag-pipeline-service/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run prompt injection filter tests
        run: |
          pytest tests/sprint7/test_prompt_injection_filter.py -v --tb=short
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
          ANTHROPIC_API_KEY: "dummy"
          VOYAGE_API_KEY: "dummy"
          REDIS_URL: "redis://localhost:6379/3"
          VAULT_ADDR: "http://localhost:8200"
          VAULT_TOKEN: "dev-root-token"
          MINIO_ENDPOINT: "http://localhost:9000"
          MINIO_ACCESS_KEY: "minioadmin"
          MINIO_SECRET_KEY: "minioadmin"

  # ---------------------------------------------------------------------------
  # Job 3: Cross-tenant RLS integration tests
  # ---------------------------------------------------------------------------
  cross-tenant-rls-tests:
    name: "Cross-Tenant RLS Integration Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [db-migrations]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aegis
          POSTGRES_USER: aegis_admin
          POSTGRES_PASSWORD: aegis_dev_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/rag-pipeline-service/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Apply all migrations
        run: bash infra/db/migrate.sh
        env:
          DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis

      - name: Install Python dependencies
        run: |
          pip install asyncpg pytest pytest-asyncio

      - name: Run cross-tenant RLS integration tests
        run: |
          pytest tests/sprint7/test_cross_tenant_rls.py -v --tb=short -m integration
        env:
          DATABASE_URL: "postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis"

  # ---------------------------------------------------------------------------
  # Job 4: Rate limiter unit tests
  # ---------------------------------------------------------------------------
  rate-limiter-tests:
    name: "Rate Limiter Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/rag-pipeline-service/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r services/rag-pipeline-service/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run rate limiter tests
        run: |
          pytest tests/sprint7/test_rate_limiter.py -v --tb=short
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
          ANTHROPIC_API_KEY: "dummy"
          VOYAGE_API_KEY: "dummy"
          REDIS_URL: "redis://localhost:6379/3"
          VAULT_ADDR: "http://localhost:8200"
          VAULT_TOKEN: "dev-root-token"
          MINIO_ENDPOINT: "http://localhost:9000"
          MINIO_ACCESS_KEY: "minioadmin"
          MINIO_SECRET_KEY: "minioadmin"

  # ---------------------------------------------------------------------------
  # Job 5: Post-quantum cryptography tests (gracefully skipped if liboqs absent)
  # ---------------------------------------------------------------------------
  pq-crypto-tests:
    name: "Post-Quantum Cryptography Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/pq-crypto-service/requirements.txt

      - name: Install system dependencies for liboqs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build libssl-dev

      - name: Install pq-crypto-service Python dependencies
        run: |
          pip install -r services/pq-crypto-service/requirements.txt
          pip install pytest pytest-asyncio

      - name: Install liboqs-python
        run: pip install liboqs-python || echo "liboqs not available, tests will be skipped"

      - name: Run PQ crypto tests (skipped if liboqs unavailable)
        run: pytest tests/sprint7/test_pq_crypto.py -v --tb=short
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
          ANTHROPIC_API_KEY: "dummy"
          VOYAGE_API_KEY: "dummy"
          VAULT_ADDR: "http://localhost:8200"
          VAULT_TOKEN: "dev-root-token"

  # ---------------------------------------------------------------------------
  # Job 6: Security gate — all critical jobs must pass
  # ---------------------------------------------------------------------------
  security-gate:
    name: "Security Gate (Sprint 7)"
    runs-on: ubuntu-latest
    needs:
      - db-migrations
      - prompt-injection-tests
      - cross-tenant-rls-tests
      - rate-limiter-tests
      - pq-crypto-tests
    if: always()

    steps:
      - name: Check all critical Sprint 7 jobs passed
        run: |
          FAILED=0

          # pq-crypto-tests is non-critical (may be skipped when liboqs is absent)
          for job_and_result in \
            "db-migrations:${{ needs.db-migrations.result }}" \
            "prompt-injection-tests:${{ needs.prompt-injection-tests.result }}" \
            "cross-tenant-rls-tests:${{ needs.cross-tenant-rls-tests.result }}" \
            "rate-limiter-tests:${{ needs.rate-limiter-tests.result }}"; do
            JOB_NAME="${job_and_result%%:*}"
            JOB_RESULT="${job_and_result##*:}"
            if [ "$JOB_RESULT" != "success" ]; then
              echo "FATAL: Critical Sprint 7 job '$JOB_NAME' did not pass (result: $JOB_RESULT)"
              FAILED=$((FAILED + 1))
            else
              echo "OK: $JOB_NAME passed"
            fi
          done

          # pq-crypto-tests: success or skipped are both acceptable
          PQ_RESULT="${{ needs.pq-crypto-tests.result }}"
          if [ "$PQ_RESULT" = "success" ] || [ "$PQ_RESULT" = "skipped" ]; then
            echo "OK: pq-crypto-tests passed or skipped gracefully (result: $PQ_RESULT)"
          else
            echo "FATAL: pq-crypto-tests failed unexpectedly (result: $PQ_RESULT)"
            FAILED=$((FAILED + 1))
          fi

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "$FAILED critical job(s) failed. Sprint 7 security gate blocked."
            exit 1
          fi

          echo ""
          echo "All Sprint 7 security gates passed."
