name: Sprint 9 — Vendor & Third-Party Risk Management (TPRM)

on:
  push:
    branches: [main, develop, 'sprint-9/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: DB migrations — V013 TPRM Schema
  # ---------------------------------------------------------------------------
  db-migrations:
    name: "Database Migrations (V013 TPRM Schema)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aegis
          POSTGRES_USER: aegis_admin
          POSTGRES_PASSWORD: aegis_dev_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Apply all migrations
        run: bash infra/db/migrate.sh

      - name: Verify V013 tables exist
        run: |
          psql "$DATABASE_URL" -c "
          SELECT table_name FROM information_schema.tables
          WHERE table_schema = 'public'
            AND table_name IN (
              'vendors',
              'vendor_questionnaires',
              'vendor_documents',
              'vendor_risk_scores',
              'vendor_contracts',
              'vendor_monitoring_events',
              'fourth_party_relationships'
            )
          ORDER BY table_name;" | tee /tmp/v013_tables.txt

          for table in \
            vendors \
            vendor_questionnaires \
            vendor_documents \
            vendor_risk_scores \
            vendor_contracts \
            vendor_monitoring_events \
            fourth_party_relationships; do
            grep -q "$table" /tmp/v013_tables.txt || \
              (echo "FATAL: V013 table '$table' not found" && exit 1)
          done
          echo "All V013 tables verified"

      - name: Verify RLS on all 7 TPRM tables
        run: |
          psql "$DATABASE_URL" -c "
          SELECT c.relname, c.relrowsecurity, c.relforcerowsecurity
          FROM pg_class c
          JOIN pg_namespace n ON n.oid = c.relnamespace
          WHERE n.nspname = 'public'
            AND c.relname IN (
              'vendors',
              'vendor_questionnaires',
              'vendor_documents',
              'vendor_risk_scores',
              'vendor_contracts',
              'vendor_monitoring_events',
              'fourth_party_relationships'
            )
          ORDER BY c.relname;" | tee /tmp/rls_check.txt

          for table in \
            vendors \
            vendor_questionnaires \
            vendor_documents \
            vendor_risk_scores \
            vendor_contracts \
            vendor_monitoring_events \
            fourth_party_relationships; do
            ROW=$(grep "$table" /tmp/rls_check.txt || true)
            if [ -z "$ROW" ]; then
              echo "FATAL: $table not found in pg_class (RLS check)"
              exit 1
            fi
            if ! echo "$ROW" | grep -q "| t "; then
              echo "FATAL: RLS is not enabled on table '$table'"
              exit 1
            fi
          done
          echo "RLS verified on all 7 V013 TPRM tables"

      - name: Assert vendor_risk_scores has no UPDATE/DELETE grants (append-only)
        run: |
          GRANTS=$(psql "$DATABASE_URL" -t -c "
          SELECT privilege_type
          FROM information_schema.role_table_grants
          WHERE table_name = 'vendor_risk_scores'
            AND grantee = 'aegis_app'
            AND privilege_type IN ('UPDATE', 'DELETE');
          " | tr -d ' ' | grep -v '^$' || true)

          if [ -n "$GRANTS" ]; then
            echo "FATAL: vendor_risk_scores must be append-only — aegis_app has: $GRANTS"
            exit 1
          fi
          echo "vendor_risk_scores immutability verified (no UPDATE/DELETE for aegis_app)"

      - name: Assert vendor_monitoring_events has no UPDATE/DELETE grants (append-only)
        run: |
          GRANTS=$(psql "$DATABASE_URL" -t -c "
          SELECT privilege_type
          FROM information_schema.role_table_grants
          WHERE table_name = 'vendor_monitoring_events'
            AND grantee = 'aegis_app'
            AND privilege_type IN ('UPDATE', 'DELETE');
          " | tr -d ' ' | grep -v '^$' || true)

          if [ -n "$GRANTS" ]; then
            echo "FATAL: vendor_monitoring_events must be append-only — aegis_app has: $GRANTS"
            exit 1
          fi
          echo "vendor_monitoring_events immutability verified (no UPDATE/DELETE for aegis_app)"

  # ---------------------------------------------------------------------------
  # Job 2: TPRM service unit tests
  # ---------------------------------------------------------------------------
  tprm-service-tests:
    name: "TPRM Service Tests (Sprint 9)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/tprm-service/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r services/tprm-service/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run Sprint 9 tests
        run: |
          pytest tests/sprint9/ -v --tb=short
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
          ANTHROPIC_API_KEY: "dummy"
          SECURITYSCORECARD_API_KEY: ""
          VOYAGE_API_KEY: "dummy"
          REDIS_URL: "redis://localhost:6379/5"
          VAULT_ADDR: "http://localhost:8200"
          VAULT_TOKEN: "dev-root-token"
          MINIO_ENDPOINT: "http://localhost:9000"
          MINIO_ACCESS_KEY: "minioadmin"
          MINIO_SECRET_KEY: "minioadmin"
          TEMPLATES_DIR: "./questionnaire-templates"

  # ---------------------------------------------------------------------------
  # Job 3: Questionnaire template JSON validation
  # ---------------------------------------------------------------------------
  questionnaire-template-validation:
    name: "Questionnaire Template JSON Validation"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate all questionnaire template JSON files
        run: |
          python - <<'PYEOF'
          import json
          import sys
          from pathlib import Path

          TEMPLATES_DIR = Path("questionnaire-templates")
          REQUIRED_TEMPLATE_KEYS = {"slug", "name", "version", "domains"}
          REQUIRED_QUESTION_KEYS = {"id", "text", "type", "risk_weight"}

          json_files = sorted(TEMPLATES_DIR.glob("*.json"))
          if not json_files:
              print(f"ERROR: No .json files found in {TEMPLATES_DIR}/")
              sys.exit(1)

          errors = []
          summary = []

          for path in json_files:
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      data = json.load(f)
              except Exception as e:
                  errors.append(f"{path.name}: JSON parse error — {e}")
                  continue

              # Template-level assertions
              for key in REQUIRED_TEMPLATE_KEYS:
                  if not data.get(key):
                      errors.append(f"{path.name}: missing or empty top-level key '{key}'")

              domains = data.get("domains", [])
              if not isinstance(domains, list) or len(domains) == 0:
                  errors.append(f"{path.name}: 'domains' must be a non-empty list")
                  continue

              total_questions = 0
              for domain in domains:
                  questions = domain.get("questions", [])
                  if not isinstance(questions, list):
                      errors.append(
                          f"{path.name} / domain '{domain.get('id', '?')}': "
                          f"'questions' must be a list"
                      )
                      continue
                  for q in questions:
                      for key in REQUIRED_QUESTION_KEYS:
                          val = q.get(key)
                          if val is None or (isinstance(val, str) and not val.strip()):
                              errors.append(
                                  f"{path.name} / domain '{domain.get('id', '?')}' "
                                  f"/ question '{q.get('id', '?')}': "
                                  f"missing or empty required field '{key}'"
                              )
                  total_questions += len(questions)

              slug = data.get("slug", path.stem)
              summary.append(f"  {slug}: {len(domains)} domains, {total_questions} questions")

              # Per-template structural assertions
              if slug == "sig-lite":
                  if len(domains) < 18:
                      errors.append(
                          f"{path.name}: sig-lite must have >= 18 domains "
                          f"(found {len(domains)})"
                      )
                  if total_questions < 54:
                      errors.append(
                          f"{path.name}: sig-lite must have >= 54 questions "
                          f"(found {total_questions})"
                      )

              if slug == "caiq-v4":
                  if len(domains) < 17:
                      errors.append(
                          f"{path.name}: caiq-v4 must have >= 17 domains "
                          f"(found {len(domains)})"
                      )

          if errors:
              print(f"\nQuestionnaire template validation FAILED with {len(errors)} error(s):\n")
              for err in errors:
                  print(f"  - {err}")
              sys.exit(1)

          print(f"Validated {len(json_files)} questionnaire template(s):")
          for line in summary:
              print(line)
          print("\nAll questionnaire template validations passed.")
          PYEOF

  # ---------------------------------------------------------------------------
  # Job 4: TypeScript type-check for tprm-ui
  # ---------------------------------------------------------------------------
  typescript-typecheck:
    name: "TypeScript Type Check (tprm-ui)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/tprm-ui/package-lock.json

      - name: Install Node dependencies
        working-directory: services/tprm-ui
        run: npm ci

      - name: Run TypeScript type-check
        working-directory: services/tprm-ui
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Job 5: Docker build + Trivy CRITICAL scan
  # ---------------------------------------------------------------------------
  docker-build:
    name: "Docker Build & Trivy Scan (tprm-service)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [tprm-service-tests, questionnaire-template-validation]

    steps:
      - uses: actions/checkout@v4

      - name: Build tprm-service Docker image
        run: |
          docker build \
            -t aegis/tprm-service:ci \
            services/tprm-service

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/tprm-service:ci

  # ---------------------------------------------------------------------------
  # Job 6: Security gate — all 5 jobs must pass
  # ---------------------------------------------------------------------------
  security-gate:
    name: "Security Gate (Sprint 9)"
    runs-on: ubuntu-latest
    needs:
      - db-migrations
      - tprm-service-tests
      - questionnaire-template-validation
      - typescript-typecheck
      - docker-build
    if: always()

    steps:
      - name: Check all Sprint 9 jobs passed
        run: |
          FAILED=0

          for job_and_result in \
            "db-migrations:${{ needs.db-migrations.result }}" \
            "tprm-service-tests:${{ needs.tprm-service-tests.result }}" \
            "questionnaire-template-validation:${{ needs.questionnaire-template-validation.result }}" \
            "typescript-typecheck:${{ needs.typescript-typecheck.result }}" \
            "docker-build:${{ needs.docker-build.result }}"; do
            JOB_NAME="${job_and_result%%:*}"
            JOB_RESULT="${job_and_result##*:}"
            if [ "$JOB_RESULT" != "success" ]; then
              echo "FATAL: Sprint 9 job '$JOB_NAME' did not pass (result: $JOB_RESULT)"
              FAILED=$((FAILED + 1))
            else
              echo "OK: $JOB_NAME passed"
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "$FAILED job(s) failed. Sprint 9 security gate blocked."
            exit 1
          fi

          echo ""
          echo "All Sprint 9 security gates passed."
