name: Sprint 17 — Audit Planning Service

on:
  push:
    branches: [main, develop, 'sprint-17/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: DB migrations — V001–V021, verify V021 audit planning schema
  # ---------------------------------------------------------------------------
  db-migrations:
    name: "Database Migrations (V021 Audit Planning Schema)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aegis
          POSTGRES_USER: aegis_admin
          POSTGRES_PASSWORD: aegis_dev_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Apply all migrations V001–V021
        run: bash infra/db/migrate.sh

      - name: Verify V021 tables exist (count = 8)
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*)
          FROM information_schema.tables
          WHERE table_schema = 'public'
            AND table_name IN (
              'audit_entity_types',
              'audit_entities',
              'audit_plans',
              'audit_plan_items',
              'audit_engagements',
              'time_entries',
              'audit_milestones',
              'resource_assignments'
            );
          " | tr -d ' ')

          echo "V021 table count: $COUNT"
          if [ "$COUNT" -ne 8 ]; then
            echo "FATAL: Expected 8 V021 audit planning tables, found $COUNT"
            exit 1
          fi
          echo "V021 table count verified ($COUNT = 8)"

      - name: Verify seeded audit_entity_types (count ≥ 7)
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*) FROM audit_entity_types;
          " | tr -d ' ')

          echo "audit_entity_types row count: $COUNT"
          if [ "$COUNT" -lt 7 ]; then
            echo "FATAL: Expected at least 7 seeded entity types, found $COUNT"
            exit 1
          fi
          echo "audit_entity_types seed verified ($COUNT ≥ 7)"

      - name: Verify time_entries RLS policy exists
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*)
          FROM pg_policies
          WHERE tablename = 'time_entries';
          " | tr -d ' ')

          echo "time_entries RLS policy count: $COUNT"
          if [ "$COUNT" -lt 1 ]; then
            echo "FATAL: time_entries must have at least one RLS policy for tenant isolation"
            exit 1
          fi
          echo "time_entries RLS tenant policy verified ($COUNT policy/policies)"

      - name: Verify time_entries is append-only (no UPDATE for aegis_app)
        run: |
          GRANTS=$(psql "$DATABASE_URL" -t -c "
          SELECT privilege_type
          FROM information_schema.role_table_grants
          WHERE table_name = 'time_entries'
            AND grantee = 'aegis_app'
            AND privilege_type IN ('UPDATE', 'DELETE');
          " | tr -d ' ' | grep -v '^$' || true)

          if [ -n "$GRANTS" ]; then
            echo "FATAL: time_entries must be append-only — aegis_app has: $GRANTS"
            exit 1
          fi
          echo "time_entries immutability verified (no UPDATE/DELETE for aegis_app)"

          SELECT_GRANT=$(psql "$DATABASE_URL" -t -c "
          SELECT privilege_type
          FROM information_schema.role_table_grants
          WHERE table_name = 'time_entries'
            AND grantee = 'aegis_app'
            AND privilege_type = 'SELECT';
          " | tr -d ' ' | grep -v '^$' || true)

          INSERT_GRANT=$(psql "$DATABASE_URL" -t -c "
          SELECT privilege_type
          FROM information_schema.role_table_grants
          WHERE table_name = 'time_entries'
            AND grantee = 'aegis_app'
            AND privilege_type = 'INSERT';
          " | tr -d ' ' | grep -v '^$' || true)

          echo "aegis_app SELECT on time_entries: ${SELECT_GRANT:-not set (may be via role)}"
          echo "aegis_app INSERT on time_entries: ${INSERT_GRANT:-not set (may be via role)}"

      - name: Verify UNIQUE constraint on audit_plans(tenant_id, plan_year)
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*)
          FROM information_schema.table_constraints
          WHERE table_name = 'audit_plans'
            AND constraint_type = 'UNIQUE';
          " | tr -d ' ')

          echo "audit_plans UNIQUE constraint count: $COUNT"
          if [ "$COUNT" -lt 1 ]; then
            echo "FATAL: audit_plans must have a UNIQUE constraint on (tenant_id, plan_year)"
            exit 1
          fi
          echo "audit_plans UNIQUE constraint verified ($COUNT constraint(s))"

      - name: Verify engagement_code index exists on audit_engagements
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*)
          FROM pg_indexes
          WHERE tablename = 'audit_engagements'
            AND indexname LIKE '%engagement_code%';
          " | tr -d ' ')

          echo "engagement_code index count: $COUNT"
          if [ "$COUNT" -lt 1 ]; then
            echo "FATAL: audit_engagements must have an index on engagement_code"
            exit 1
          fi
          echo "engagement_code index verified ($COUNT index/indexes)"

  # ---------------------------------------------------------------------------
  # Job 2: audit-planning-service Python unit tests (Sprint 17)
  # ---------------------------------------------------------------------------
  audit-planning-service-tests:
    name: "Audit Planning Service Tests (Sprint 17)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/audit-planning-service/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install pydantic pydantic-settings
          pip install -r services/audit-planning-service/requirements.txt

      - name: Run Sprint 17 tests
        run: |
          pytest tests/sprint17/ -v --tb=short
        env:
          PYTHONPATH: .
          DATABASE_URL: "postgresql://test:test@localhost/test"
          ANTHROPIC_API_KEY: "dummy"

  # ---------------------------------------------------------------------------
  # Job 3: TypeScript type-check for audit-planning-ui
  # ---------------------------------------------------------------------------
  typescript-typecheck:
    name: "TypeScript Type Check (audit-planning-ui)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/audit-planning-ui/package-lock.json

      - name: Install Node dependencies
        working-directory: services/audit-planning-ui
        run: npm ci

      - name: Run TypeScript type-check
        working-directory: services/audit-planning-ui
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Job 4: Docker build + Trivy CRITICAL scan (audit-planning-service)
  # ---------------------------------------------------------------------------
  docker-build-audit-planning-service:
    name: "Docker Build & Trivy Scan (audit-planning-service)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [audit-planning-service-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build audit-planning-service Docker image
        run: |
          docker build \
            -t aegis/audit-planning-service:ci \
            services/audit-planning-service

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan (audit-planning-service)
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/audit-planning-service:ci

  # ---------------------------------------------------------------------------
  # Job 5: Docker build + Trivy CRITICAL scan (audit-planning-ui)
  # ---------------------------------------------------------------------------
  docker-build-audit-planning-ui:
    name: "Docker Build & Trivy Scan (audit-planning-ui)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [typescript-typecheck]

    steps:
      - uses: actions/checkout@v4

      - name: Build audit-planning-ui Docker image
        run: |
          docker build \
            -t aegis/audit-planning-ui:ci \
            services/audit-planning-ui

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan (audit-planning-ui)
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/audit-planning-ui:ci

  # ---------------------------------------------------------------------------
  # Job 6: Security gate — all 5 upstream jobs must succeed
  # ---------------------------------------------------------------------------
  security-gate:
    name: "Security Gate (Sprint 17)"
    runs-on: ubuntu-latest
    needs:
      - db-migrations
      - audit-planning-service-tests
      - typescript-typecheck
      - docker-build-audit-planning-service
      - docker-build-audit-planning-ui
    if: always()

    steps:
      - name: Check all Sprint 17 jobs passed
        run: |
          FAILED=0

          for job_and_result in \
            "db-migrations:${{ needs.db-migrations.result }}" \
            "audit-planning-service-tests:${{ needs.audit-planning-service-tests.result }}" \
            "typescript-typecheck:${{ needs.typescript-typecheck.result }}" \
            "docker-build-audit-planning-service:${{ needs.docker-build-audit-planning-service.result }}" \
            "docker-build-audit-planning-ui:${{ needs.docker-build-audit-planning-ui.result }}"; do
            JOB_NAME="${job_and_result%%:*}"
            JOB_RESULT="${job_and_result##*:}"
            if [ "$JOB_RESULT" != "success" ]; then
              echo "FATAL: Sprint 17 job '$JOB_NAME' did not pass (result: $JOB_RESULT)"
              FAILED=$((FAILED + 1))
            else
              echo "OK: $JOB_NAME passed"
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "$FAILED job(s) failed. Sprint 17 security gate blocked."
            exit 1
          fi

          echo ""
          echo "All Sprint 17 security gates passed."
