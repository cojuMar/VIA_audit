name: Sprint 15 — Agentic AI & Natural Language Platform Interface

on:
  push:
    branches: [main, develop, 'sprint-15/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: DB migrations — V001–V019, verify V019 agent schema + immutability + RLS
  # ---------------------------------------------------------------------------
  db-migrations:
    name: "Database Migrations (V019 Agent Schema)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aegis
          POSTGRES_USER: aegis_admin
          POSTGRES_PASSWORD: aegis_dev_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Apply all migrations V001–V019
        run: bash infra/db/migrate.sh

      - name: Verify V019 tables exist
        run: |
          psql "$DATABASE_URL" -c "
          SELECT table_name FROM information_schema.tables
          WHERE table_schema = 'public'
            AND table_name IN (
              'agent_conversations',
              'agent_messages',
              'agent_tool_calls',
              'agent_reports',
              'agent_scheduled_queries',
              'agent_feedback'
            )
          ORDER BY table_name;" | tee /tmp/v019_tables.txt

          for table in \
            agent_conversations \
            agent_messages \
            agent_tool_calls \
            agent_reports \
            agent_scheduled_queries \
            agent_feedback; do
            grep -q "$table" /tmp/v019_tables.txt || \
              (echo "FATAL: V019 table '$table' not found" && exit 1)
          done
          echo "All V019 tables verified"

      - name: Assert count = 6 V019 tables
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*) FROM information_schema.tables
          WHERE table_schema = 'public'
            AND table_name IN (
              'agent_conversations',
              'agent_messages',
              'agent_tool_calls',
              'agent_reports',
              'agent_scheduled_queries',
              'agent_feedback'
            );
          " | tr -d ' ')

          echo "V019 table count: $COUNT"
          if [ "$COUNT" -ne 6 ]; then
            echo "FATAL: Expected 6 V019 tables, found $COUNT"
            exit 1
          fi
          echo "V019 table count verified ($COUNT = 6)"

      - name: Verify immutability of agent_messages, agent_tool_calls, agent_reports, agent_feedback
        run: |
          for table in agent_messages agent_tool_calls agent_reports agent_feedback; do
            GRANTS=$(psql "$DATABASE_URL" -t -c "
            SELECT privilege_type
            FROM information_schema.role_table_grants
            WHERE table_name = '$table'
              AND grantee = 'aegis_app'
              AND privilege_type IN ('UPDATE', 'DELETE');
            " | tr -d ' ' | grep -v '^$' || true)

            if [ -n "$GRANTS" ]; then
              echo "FATAL: $table must be append-only — aegis_app has: $GRANTS"
              exit 1
            fi
            echo "$table immutability verified (no UPDATE/DELETE for aegis_app)"
          done

      - name: Verify RLS is enabled on agent_conversations
        run: |
          RLS_ENABLED=$(psql "$DATABASE_URL" -t -c "
          SELECT relrowsecurity
          FROM pg_class
          WHERE relname = 'agent_conversations'
            AND relnamespace = (
              SELECT oid FROM pg_namespace WHERE nspname = 'public'
            );
          " | tr -d ' ')

          echo "agent_conversations RLS enabled: $RLS_ENABLED"
          if [ "$RLS_ENABLED" != "t" ]; then
            echo "FATAL: RLS must be enabled on agent_conversations (got '$RLS_ENABLED')"
            exit 1
          fi
          echo "RLS on agent_conversations verified"

  # ---------------------------------------------------------------------------
  # Job 2: AI agent service Python unit tests (Sprint 15)
  # ---------------------------------------------------------------------------
  ai-agent-service-tests:
    name: "AI Agent Service Tests (Sprint 15)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/ai-agent-service/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -r services/ai-agent-service/requirements.txt

      - name: Run Sprint 15 tests
        run: |
          pytest tests/sprint15/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: "dummy"
          DATABASE_URL: "postgresql://test:test@localhost/test"
          AGENT_MODEL: "claude-opus-4-5"

  # ---------------------------------------------------------------------------
  # Job 3: TypeScript type-check for ai-agent-ui
  # ---------------------------------------------------------------------------
  typescript-typecheck:
    name: "TypeScript Type Check (ai-agent-ui)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/ai-agent-ui/package-lock.json

      - name: Install Node dependencies
        working-directory: services/ai-agent-ui
        run: npm ci

      - name: Run TypeScript type-check
        working-directory: services/ai-agent-ui
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Job 4: Docker build + Trivy CRITICAL scan (ai-agent-service)
  # ---------------------------------------------------------------------------
  docker-build-ai-agent-service:
    name: "Docker Build & Trivy Scan (ai-agent-service)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ai-agent-service-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build ai-agent-service Docker image
        run: |
          docker build \
            -t aegis/ai-agent-service:ci \
            services/ai-agent-service

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/ai-agent-service:ci

  # ---------------------------------------------------------------------------
  # Job 5: Docker build + Trivy CRITICAL scan (ai-agent-ui)
  # ---------------------------------------------------------------------------
  docker-build-ai-agent-ui:
    name: "Docker Build & Trivy Scan (ai-agent-ui)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [typescript-typecheck]

    steps:
      - uses: actions/checkout@v4

      - name: Build ai-agent-ui Docker image
        run: |
          docker build \
            -t aegis/ai-agent-ui:ci \
            services/ai-agent-ui

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/ai-agent-ui:ci

  # ---------------------------------------------------------------------------
  # Job 6: Security gate — all 5 upstream jobs must succeed
  # ---------------------------------------------------------------------------
  security-gate:
    name: "Security Gate (Sprint 15)"
    runs-on: ubuntu-latest
    needs:
      - db-migrations
      - ai-agent-service-tests
      - typescript-typecheck
      - docker-build-ai-agent-service
      - docker-build-ai-agent-ui
    if: always()

    steps:
      - name: Check all Sprint 15 jobs passed
        run: |
          FAILED=0

          for job_and_result in \
            "db-migrations:${{ needs.db-migrations.result }}" \
            "ai-agent-service-tests:${{ needs.ai-agent-service-tests.result }}" \
            "typescript-typecheck:${{ needs.typescript-typecheck.result }}" \
            "docker-build-ai-agent-service:${{ needs.docker-build-ai-agent-service.result }}" \
            "docker-build-ai-agent-ui:${{ needs.docker-build-ai-agent-ui.result }}"; do
            JOB_NAME="${job_and_result%%:*}"
            JOB_RESULT="${job_and_result##*:}"
            if [ "$JOB_RESULT" != "success" ]; then
              echo "FATAL: Sprint 15 job '$JOB_NAME' did not pass (result: $JOB_RESULT)"
              FAILED=$((FAILED + 1))
            else
              echo "OK: $JOB_NAME passed"
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "$FAILED job(s) failed. Sprint 15 security gate blocked."
            exit 1
          fi

          echo ""
          echo "All Sprint 15 security gates passed."
