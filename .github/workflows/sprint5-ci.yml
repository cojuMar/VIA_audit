name: Sprint 5 — Tri-Modal UX

on:
  push:
    branches: [main, develop, 'sprint-5/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: DB migrations (V009 — Dashboard schema)
  # ---------------------------------------------------------------------------
  db-migrations:
    name: "🗄️ Database Migrations (V009 Dashboard Schema)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: aegis
          POSTGRES_USER: aegis_admin
          POSTGRES_PASSWORD: aegis_dev_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis

    steps:
      - uses: actions/checkout@v4
      - name: Apply all migrations
        run: bash infra/db/migrate.sh

      - name: Verify V009 tables exist
        run: |
          psql "$DATABASE_URL" -c "
          SELECT table_name FROM information_schema.tables
          WHERE table_schema='public'
          AND table_name IN (
            'white_label_configs','dashboard_configs','audit_hub_items',
            'health_score_snapshots','firm_client_links'
          )
          ORDER BY table_name;" | tee /tmp/tables.txt

          for table in audit_hub_items dashboard_configs firm_client_links health_score_snapshots white_label_configs; do
            grep -q "$table" /tmp/tables.txt || (echo "FATAL: Table $table not found" && exit 1)
          done
          echo "All V009 tables verified ✓"

      - name: Verify RLS on tenant-scoped tables
        run: |
          psql "$DATABASE_URL" -c "
          SELECT relname, relrowsecurity, relforcerowsecurity
          FROM pg_class
          WHERE relname IN ('white_label_configs','dashboard_configs','audit_hub_items','health_score_snapshots')
          ORDER BY relname;" | tee /tmp/rls.txt

          for table in white_label_configs dashboard_configs audit_hub_items health_score_snapshots; do
            grep -q "$table" /tmp/rls.txt || (echo "FATAL: $table not in pg_class" && exit 1)
          done
          echo "RLS verified ✓"

  # ---------------------------------------------------------------------------
  # Job 2: Dashboard BFF Python tests
  # ---------------------------------------------------------------------------
  dashboard-bff-tests:
    name: "📊 Dashboard BFF Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/dashboard-service/requirements.txt

      - name: Install dependencies
        run: |
          cd services/dashboard-service
          pip install -r requirements.txt pytest pytest-asyncio

      - name: Run dashboard BFF tests
        run: |
          cd services/dashboard-service
          pytest ../../tests/sprint5/ -v --tb=short
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          FORENSIC_ML_URL: "http://localhost:3007"
          RAG_PIPELINE_URL: "http://localhost:3008"
          EVIDENCE_STORE_URL: "http://localhost:3005"
          AUTH_SERVICE_JWKS_URL: "http://localhost:3001/.well-known/jwks.json"

  # ---------------------------------------------------------------------------
  # Job 3: React frontend tests
  # ---------------------------------------------------------------------------
  frontend-tests:
    name: "⚛️ React Frontend Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/dashboard-ui/package.json

      - name: Install dependencies
        run: |
          cd services/dashboard-ui
          npm install

      - name: Run component tests
        run: |
          cd services/dashboard-ui
          npm test

  # ---------------------------------------------------------------------------
  # Job 4: TypeScript type check
  # ---------------------------------------------------------------------------
  typescript-check:
    name: "📝 TypeScript Type Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/dashboard-ui/package.json

      - name: Install dependencies
        run: |
          cd services/dashboard-ui
          npm install

      - name: TypeScript type check
        run: |
          cd services/dashboard-ui
          npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Job 5: Docker builds
  # ---------------------------------------------------------------------------
  docker-builds:
    name: "🐳 Docker Build Validation (Sprint 5)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [dashboard-bff-tests, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build dashboard-service
        run: docker build -t aegis/dashboard-service:ci services/dashboard-service

      - name: Build dashboard-ui
        run: docker build -t aegis/dashboard-ui:ci services/dashboard-ui

      - name: Scan dashboard-service for CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: aegis/dashboard-service:ci
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # Security gate
  # ---------------------------------------------------------------------------
  security-gate:
    name: "🚨 Security Gate (Sprint 5)"
    runs-on: ubuntu-latest
    needs: [db-migrations, dashboard-bff-tests, frontend-tests, typescript-check, docker-builds]
    if: always()

    steps:
      - name: Check all critical jobs passed
        run: |
          for job_result in \
            "${{ needs.db-migrations.result }}" \
            "${{ needs.dashboard-bff-tests.result }}" \
            "${{ needs.frontend-tests.result }}" \
            "${{ needs.typescript-check.result }}" \
            "${{ needs.docker-builds.result }}"; do
            if [ "$job_result" != "success" ]; then
              echo "FATAL: A critical Sprint 5 job failed: $job_result"
              exit 1
            fi
          done
          echo "All Sprint 5 gates passed ✓"
