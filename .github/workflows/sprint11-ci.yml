name: Sprint 11 — Continuous Monitoring Engine

on:
  push:
    branches: [main, develop, 'sprint-11/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: DB migrations — V001–V015, verify V015 tables + seeded data + immutability + RLS
  # ---------------------------------------------------------------------------
  db-migrations:
    name: "Database Migrations (V015 Monitoring Schema)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aegis
          POSTGRES_USER: aegis_admin
          POSTGRES_PASSWORD: aegis_dev_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://aegis_admin:aegis_dev_pw@localhost:5432/aegis

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Apply all migrations V001–V015
        run: bash infra/db/migrate.sh

      - name: Verify V015 tables exist
        run: |
          psql "$DATABASE_URL" -c "
          SELECT table_name FROM information_schema.tables
          WHERE table_schema = 'public'
            AND table_name IN (
              'monitoring_rules',
              'sod_rules',
              'tenant_monitoring_configs',
              'monitoring_data_sources',
              'monitoring_runs',
              'monitoring_findings',
              'sod_violations',
              'cloud_config_snapshots'
            )
          ORDER BY table_name;" | tee /tmp/v015_tables.txt

          for table in \
            monitoring_rules \
            sod_rules \
            tenant_monitoring_configs \
            monitoring_data_sources \
            monitoring_runs \
            monitoring_findings \
            sod_violations \
            cloud_config_snapshots; do
            grep -q "$table" /tmp/v015_tables.txt || \
              (echo "FATAL: V015 table '$table' not found" && exit 1)
          done
          echo "All V015 tables verified"

      - name: Assert count = 8 V015 tables
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "
          SELECT COUNT(*) FROM information_schema.tables
          WHERE table_schema='public'
            AND table_name IN (
              'monitoring_rules',
              'sod_rules',
              'tenant_monitoring_configs',
              'monitoring_data_sources',
              'monitoring_runs',
              'monitoring_findings',
              'sod_violations',
              'cloud_config_snapshots'
            );
          " | tr -d ' ')

          echo "V015 table count: $COUNT"
          if [ "$COUNT" -ne 8 ]; then
            echo "FATAL: Expected 8 V015 tables, found $COUNT"
            exit 1
          fi
          echo "V015 table count verified ($COUNT = 8)"

      - name: Verify seeded monitoring_rules count >= 15
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "SELECT COUNT(*) FROM monitoring_rules;" | tr -d ' ')
          echo "monitoring_rules count: $COUNT"
          if [ "$COUNT" -lt 15 ]; then
            echo "FATAL: Expected >= 15 monitoring_rules, found $COUNT"
            exit 1
          fi
          echo "monitoring_rules seed verified ($COUNT >= 15)"

      - name: Verify seeded sod_rules count >= 10
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c "SELECT COUNT(*) FROM sod_rules;" | tr -d ' ')
          echo "sod_rules count: $COUNT"
          if [ "$COUNT" -lt 10 ]; then
            echo "FATAL: Expected >= 10 sod_rules, found $COUNT"
            exit 1
          fi
          echo "sod_rules seed verified ($COUNT >= 10)"

      - name: Verify immutability of append-only tables
        run: |
          for table in monitoring_runs monitoring_findings sod_violations cloud_config_snapshots; do
            GRANTS=$(psql "$DATABASE_URL" -t -c "
            SELECT privilege_type
            FROM information_schema.role_table_grants
            WHERE table_name = '$table'
              AND grantee = 'aegis_app'
              AND privilege_type IN ('UPDATE', 'DELETE');
            " | tr -d ' ' | grep -v '^$' || true)

            if [ -n "$GRANTS" ]; then
              echo "FATAL: $table must be append-only — aegis_app has: $GRANTS"
              exit 1
            fi
            echo "$table immutability verified (no UPDATE/DELETE for aegis_app)"
          done

      - name: Verify RLS enabled on monitoring_findings
        run: |
          RLS=$(psql "$DATABASE_URL" -t -c "
          SELECT relrowsecurity FROM pg_class
          WHERE relname = 'monitoring_findings';
          " | tr -d ' ')

          echo "monitoring_findings RLS: $RLS"
          if [ "$RLS" != "t" ]; then
            echo "FATAL: RLS is not enabled on monitoring_findings (got '$RLS')"
            exit 1
          fi
          echo "RLS verified on monitoring_findings"

  # ---------------------------------------------------------------------------
  # Job 2: Monitoring service Python unit tests (Sprint 11)
  # ---------------------------------------------------------------------------
  monitoring-service-tests:
    name: "Monitoring Service Tests (Sprint 11)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/monitoring-service/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install numpy scipy rapidfuzz pytest pytest-asyncio
          pip install -r services/monitoring-service/requirements.txt

      - name: Run Sprint 11 tests
        run: |
          pytest tests/sprint11/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: "dummy"
          DATABASE_URL: "postgresql://test:test@localhost/test"
          MONITORING_SCHEDULE_ENABLED: "false"

  # ---------------------------------------------------------------------------
  # Job 3: TypeScript type-check for monitoring-ui
  # ---------------------------------------------------------------------------
  typescript-typecheck:
    name: "TypeScript Type Check (monitoring-ui)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/monitoring-ui/package-lock.json

      - name: Install Node dependencies
        working-directory: services/monitoring-ui
        run: npm ci

      - name: Run TypeScript type-check
        working-directory: services/monitoring-ui
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Job 4: Docker build + Trivy CRITICAL scan (monitoring-service)
  # ---------------------------------------------------------------------------
  docker-build-monitoring-service:
    name: "Docker Build & Trivy Scan (monitoring-service)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [monitoring-service-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build monitoring-service Docker image
        run: |
          docker build \
            -t aegis/monitoring-service:ci \
            services/monitoring-service

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/monitoring-service:ci

  # ---------------------------------------------------------------------------
  # Job 5: Docker build + Trivy CRITICAL scan (monitoring-ui)
  # ---------------------------------------------------------------------------
  docker-build-monitoring-ui:
    name: "Docker Build & Trivy Scan (monitoring-ui)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [typescript-typecheck]

    steps:
      - uses: actions/checkout@v4

      - name: Build monitoring-ui Docker image
        run: |
          docker build \
            -t aegis/monitoring-ui:ci \
            services/monitoring-ui

      - name: Install Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy CRITICAL vulnerability scan
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            aegis/monitoring-ui:ci

  # ---------------------------------------------------------------------------
  # Job 6: Security gate — all 5 upstream jobs must pass
  # ---------------------------------------------------------------------------
  security-gate:
    name: "Security Gate (Sprint 11)"
    runs-on: ubuntu-latest
    needs:
      - db-migrations
      - monitoring-service-tests
      - typescript-typecheck
      - docker-build-monitoring-service
      - docker-build-monitoring-ui
    if: always()

    steps:
      - name: Check all Sprint 11 jobs passed
        run: |
          FAILED=0

          for job_and_result in \
            "db-migrations:${{ needs.db-migrations.result }}" \
            "monitoring-service-tests:${{ needs.monitoring-service-tests.result }}" \
            "typescript-typecheck:${{ needs.typescript-typecheck.result }}" \
            "docker-build-monitoring-service:${{ needs.docker-build-monitoring-service.result }}" \
            "docker-build-monitoring-ui:${{ needs.docker-build-monitoring-ui.result }}"; do
            JOB_NAME="${job_and_result%%:*}"
            JOB_RESULT="${job_and_result##*:}"
            if [ "$JOB_RESULT" != "success" ]; then
              echo "FATAL: Sprint 11 job '$JOB_NAME' did not pass (result: $JOB_RESULT)"
              FAILED=$((FAILED + 1))
            else
              echo "OK: $JOB_NAME passed"
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "$FAILED job(s) failed. Sprint 11 security gate blocked."
            exit 1
          fi

          echo ""
          echo "All Sprint 11 security gates passed."
