user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/svg+xml
        text/cache-manifest
        text/css
        text/javascript
        text/plain
        text/vcard
        text/xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()";

        # PWA Service Worker: allow SW to control full origin
        add_header Service-Worker-Allowed "/";

        # API proxy to mobile-sync-service
        location /api/ {
            proxy_pass http://mobile-sync-service:3024/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 120s;
            proxy_connect_timeout 30s;
            # Pass through tenant header
            proxy_set_header X-Tenant-ID $http_x_tenant_id;
        }

        # Immutable hashed assets (Vite adds content hash to filenames)
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|ico|webp|wasm)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Service-Worker-Allowed "/";
            try_files $uri =404;
        }

        # Service worker — must not be cached
        location ~* (sw\.js|workbox-.*\.js)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Service-Worker-Allowed "/";
            try_files $uri =404;
        }

        # Web app manifest — short cache
        location ~* manifest\.(json|webmanifest)$ {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        # SPA fallback — all unknown paths serve index.html
        location / {
            try_files $uri $uri/ /index.html;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # Health check endpoint
        location /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
