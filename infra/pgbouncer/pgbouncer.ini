[databases]
aegis = host=postgres port=5432 dbname=aegis

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
; Sprint 22: pool_mode set to 'session' so app.tenant_id (set with
; set_config(..., false)) cannot leak between unrelated callers when a single
; backend connection is reused. Services SHOULD additionally use
; set_config(..., true) inside an explicit transaction (defense-in-depth).
pool_mode = session
max_client_conn = 1000
default_pool_size = 20
reserve_pool_size = 5
reserve_pool_timeout = 3
server_reset_query = RESET ALL; SET app.tenant_id = '';
server_check_query = SELECT 1
server_lifetime = 3600
server_idle_timeout = 600
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60
ignore_startup_parameters = extra_float_digits
